<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antoine de Maintenant — BI & Automation Specialist</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;font-size:16px}
  body{background:#080C10;color:#E8EDF2;font-family:'Syne',sans-serif;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#080C10}
  ::-webkit-scrollbar-thumb{background:#1E7FD8;border-radius:2px}

  @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideRight{from{width:0}to{width:100%}}
  @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
  @keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes drawLine{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
  @keyframes countUp{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
  @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(30,127,216,.3)}50%{box-shadow:0 0 40px rgba(30,127,216,.6)}}

  .fade-up{animation:fadeUp .6s ease forwards}
  .fade-in{animation:fadeIn .8s ease forwards}

  /* GRID BACKGROUND */
  .grid-overlay{
    position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      linear-gradient(rgba(30,127,216,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(30,127,216,.04) 1px,transparent 1px);
    background-size:48px 48px;
  }

  /* NAV */
  .nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:rgba(8,12,16,.85);backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(30,127,216,.15);
    padding:0 48px;height:64px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .nav-logo{
    font-family:'JetBrains Mono',monospace;font-size:.75rem;
    color:#1E7FD8;letter-spacing:3px;text-transform:uppercase;
  }
  .nav-links{display:flex;gap:32px}
  .nav-link{
    font-family:'JetBrains Mono',monospace;font-size:.65rem;
    color:rgba(232,237,242,.4);letter-spacing:2px;text-transform:uppercase;
    cursor:pointer;transition:color .2s;border:none;background:none;
  }
  .nav-link:hover{color:#1E7FD8}

  /* HERO */
  .hero{
    min-height:100vh;display:flex;flex-direction:column;
    justify-content:center;padding:80px 48px 80px;
    position:relative;max-width:1400px;margin:0 auto;
  }
  .hero-label{
    font-family:'JetBrains Mono',monospace;font-size:.65rem;
    color:#1E7FD8;letter-spacing:4px;text-transform:uppercase;
    margin-bottom:32px;display:flex;align-items:center;gap:12px;
  }
  .hero-label::before{
    content:'';display:block;width:32px;height:1px;background:#1E7FD8;
  }
  .hero-h1{
    font-family:'DM Serif Display',serif;
    font-size:clamp(3.5rem,8vw,7.5rem);line-height:.92;
    letter-spacing:-2px;margin-bottom:24px;
  }
  .hero-h1 em{color:#1E7FD8;font-style:italic}
  .hero-h1 .ghost{color:transparent;-webkit-text-stroke:1px rgba(232,237,242,.2)}
  .hero-sub{
    font-family:'Syne',sans-serif;font-size:1.1rem;
    color:rgba(232,237,242,.5);max-width:540px;line-height:1.7;
    margin-bottom:48px;
  }
  .hero-actions{display:flex;gap:16px;flex-wrap:wrap}
  .btn-primary{
    background:#1E7FD8;color:#fff;
    font-family:'JetBrains Mono',monospace;font-size:.7rem;
    letter-spacing:2px;text-transform:uppercase;padding:14px 32px;
    border:none;cursor:pointer;transition:all .2s;
    position:relative;overflow:hidden;
  }
  .btn-primary:hover{background:#2A8FE8;transform:translateY(-2px);box-shadow:0 8px 32px rgba(30,127,216,.4)}
  .btn-secondary{
    background:transparent;color:rgba(232,237,242,.7);
    font-family:'JetBrains Mono',monospace;font-size:.7rem;
    letter-spacing:2px;text-transform:uppercase;padding:14px 32px;
    border:1px solid rgba(232,237,242,.15);cursor:pointer;transition:all .2s;
  }
  .btn-secondary:hover{border-color:#1E7FD8;color:#1E7FD8}

  /* METRICS STRIP */
  .metrics-strip{
    background:rgba(14,20,28,.8);border:1px solid rgba(30,127,216,.12);
    padding:32px 48px;
    display:grid;grid-template-columns:repeat(4,1fr);gap:32px;
    position:relative;
  }
  .metric-item{text-align:center}
  .metric-value{
    font-family:'JetBrains Mono',monospace;
    font-size:2.8rem;font-weight:700;color:#1E7FD8;
    display:block;line-height:1;
  }
  .metric-label{
    font-family:'JetBrains Mono',monospace;font-size:.6rem;
    color:rgba(232,237,242,.35);letter-spacing:3px;
    text-transform:uppercase;margin-top:8px;display:block;
  }
  .metric-divider{
    position:absolute;top:50%;transform:translateY(-50%);
    width:1px;background:rgba(30,127,216,.1);height:60%;
  }

  /* SECTION */
  .section{padding:100px 48px;max-width:1400px;margin:0 auto}
  .section-header{margin-bottom:64px}
  .section-label{
    font-family:'JetBrains Mono',monospace;font-size:.65rem;
    color:#1E7FD8;letter-spacing:4px;text-transform:uppercase;
    display:flex;align-items:center;gap:12px;margin-bottom:16px;
  }
  .section-label::before{content:'';display:block;width:24px;height:1px;background:#1E7FD8}
  .section-title{
    font-family:'DM Serif Display',serif;
    font-size:clamp(2rem,4vw,3.5rem);line-height:1.1;
  }

  /* EXPERIENCE */
  .exp-grid{display:grid;grid-template-columns:1fr 3fr;gap:80px}
  .exp-timeline{position:relative;padding-left:24px}
  .exp-timeline::before{
    content:'';position:absolute;left:0;top:8px;bottom:0;
    width:1px;background:rgba(30,127,216,.2);
  }
  .exp-item{
    padding:32px;border:1px solid rgba(30,127,216,.1);
    background:rgba(14,20,28,.4);margin-bottom:24px;
    position:relative;transition:all .3s;cursor:pointer;
  }
  .exp-item:hover{border-color:rgba(30,127,216,.4);background:rgba(14,20,28,.8)}
  .exp-item.active{border-color:#1E7FD8;background:rgba(30,127,216,.06)}
  .exp-item::before{
    content:'';position:absolute;left:-30px;top:36px;
    width:8px;height:8px;border-radius:50%;background:#1E7FD8;
    box-shadow:0 0 0 3px rgba(30,127,216,.2);
  }
  .exp-date{
    font-family:'JetBrains Mono',monospace;font-size:.6rem;
    color:#1E7FD8;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;
  }
  .exp-role{font-size:1rem;font-weight:700;margin-bottom:4px}
  .exp-company{font-size:.85rem;color:rgba(232,237,242,.5)}
  .exp-detail{
    background:rgba(14,20,28,.6);border:1px solid rgba(30,127,216,.1);
    padding:40px;position:sticky;top:88px;
  }
  .exp-detail-title{
    font-family:'DM Serif Display',serif;font-size:1.8rem;
    margin-bottom:8px;
  }
  .exp-detail-sub{
    font-family:'JetBrains Mono',monospace;font-size:.7rem;
    color:#1E7FD8;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;
  }
  .exp-bullets{list-style:none;display:flex;flex-direction:column;gap:16px}
  .exp-bullets li{
    display:flex;gap:12px;font-size:.9rem;
    color:rgba(232,237,242,.7);line-height:1.6;
  }
  .exp-bullets li::before{
    content:'→';color:#1E7FD8;flex-shrink:0;margin-top:2px;
  }
  .exp-tag{
    display:inline-block;background:rgba(30,127,216,.1);
    border:1px solid rgba(30,127,216,.2);color:#1E7FD8;
    font-family:'JetBrains Mono',monospace;font-size:.55rem;
    letter-spacing:2px;text-transform:uppercase;
    padding:4px 10px;margin:4px 4px 0 0;
  }

  /* DASHBOARD SECTION */
  .dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .dashboard-card{
    background:rgba(14,20,28,.7);border:1px solid rgba(30,127,216,.12);
    padding:28px;position:relative;overflow:hidden;
  }
  .dashboard-card::after{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,#1E7FD8,transparent);
  }
  .card-title{
    font-family:'JetBrains Mono',monospace;font-size:.65rem;
    color:rgba(232,237,242,.4);letter-spacing:3px;text-transform:uppercase;
    margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;
  }
  .card-live{
    display:flex;align-items:center;gap:6px;color:#22C55E;font-size:.55rem;
  }
  .card-live::before{
    content:'';width:6px;height:6px;border-radius:50%;background:#22C55E;
    animation:pulse 2s infinite;
  }

  /* BAR CHART */
  .bar-chart{display:flex;flex-direction:column;gap:12px}
  .bar-row{display:flex;align-items:center;gap:12px}
  .bar-label{
    font-family:'JetBrains Mono',monospace;font-size:.6rem;
    color:rgba(232,237,242,.5);width:100px;text-align:right;flex-shrink:0;
  }
  .bar-track{flex:1;height:6px;background:rgba(30,127,216,.08);position:relative}
  .bar-fill{
    height:100%;background:linear-gradient(90deg,#1E7FD8,#38BDF8);
    transition:width 1.5s cubic-bezier(.16,1,.3,1);
  }
  .bar-val{
    font-family:'JetBrains Mono',monospace;font-size:.6rem;
    color:#1E7FD8;width:36px;flex-shrink:0;
  }

  /* LINE CHART SVG */
  .chart-svg{width:100%;height:120px}
  .chart-line{
    fill:none;stroke:#1E7FD8;stroke-width:2;
    stroke-dasharray:1000;animation:drawLine 2s ease forwards;
  }
  .chart-area{fill:url(#areaGrad);opacity:.3}
  .chart-dot{fill:#1E7FD8;r:3}

  /* RADAR */
  .radar-wrap{display:flex;align-items:center;justify-content:center;padding:8px 0}

  /* SKILLS */
  .skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .skill-card{
    background:rgba(14,20,28,.5);border:1px solid rgba(30,127,216,.1);
    padding:20px;transition:all .25s;cursor:default;
  }
  .skill-card:hover{border-color:rgba(30,127,216,.35);transform:translateY(-3px)}
  .skill-icon{font-size:1.5rem;margin-bottom:12px}
  .skill-name{font-size:.9rem;font-weight:700;margin-bottom:6px}
  .skill-desc{font-size:.75rem;color:rgba(232,237,242,.45);line-height:1.5}
  .skill-level{
    display:flex;gap:4px;margin-top:12px;
  }
  .skill-dot{width:20px;height:3px;border-radius:2px}
  .skill-dot.on{background:#1E7FD8}
  .skill-dot.off{background:rgba(30,127,216,.15)}

  /* TERMINAL */
  .terminal{
    background:#04080C;border:1px solid rgba(30,127,216,.2);
    font-family:'JetBrains Mono',monospace;padding:24px;
    position:relative;
  }
  .terminal-header{
    display:flex;gap:8px;margin-bottom:20px;
  }
  .terminal-dot{width:10px;height:10px;border-radius:50%}
  .t-red{background:#FF5F57}
  .t-yellow{background:#FEBC2E}
  .t-green{background:#28C840}
  .terminal-line{
    font-size:.75rem;color:rgba(232,237,242,.7);
    margin-bottom:6px;line-height:1.6;
  }
  .terminal-line .prompt{color:#1E7FD8}
  .terminal-line .cmd{color:#22C55E}
  .terminal-line .out{color:rgba(232,237,242,.5)}
  .terminal-line .highlight{color:#F59E0B}
  .cursor-blink{
    display:inline-block;width:8px;height:14px;
    background:#1E7FD8;animation:blink 1s infinite;vertical-align:middle;
  }

  /* CONTACT */
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
  .contact-item{
    display:flex;gap:16px;align-items:flex-start;margin-bottom:24px;
  }
  .contact-icon{
    width:40px;height:40px;border:1px solid rgba(30,127,216,.3);
    display:flex;align-items:center;justify-content:center;
    font-size:1rem;flex-shrink:0;
  }
  .contact-label{
    font-family:'JetBrains Mono',monospace;font-size:.6rem;
    color:rgba(232,237,242,.3);letter-spacing:2px;text-transform:uppercase;
    margin-bottom:4px;
  }
  .contact-value{font-size:.9rem;color:rgba(232,237,242,.8)}

  /* WORLD MAP PLACEHOLDER */
  .world-strip{
    background:rgba(14,20,28,.7);border:1px solid rgba(30,127,216,.1);
    padding:32px 48px;
    display:flex;align-items:center;gap:64px;flex-wrap:wrap;
    justify-content:center;
  }
  .country-item{text-align:center}
  .country-flag{font-size:2rem;margin-bottom:8px}
  .country-name{
    font-family:'JetBrains Mono',monospace;font-size:.6rem;
    color:rgba(232,237,242,.4);letter-spacing:2px;text-transform:uppercase;
  }

  /* FOOTER */
  .footer{
    text-align:center;padding:48px;border-top:1px solid rgba(30,127,216,.08);
    font-family:'JetBrains Mono',monospace;font-size:.65rem;
    color:rgba(232,237,242,.2);letter-spacing:2px;
  }

  /* SCROLL REVEAL */
  .reveal{opacity:0;transform:translateY(24px);transition:all .7s cubic-bezier(.16,1,.3,1)}
  .reveal.visible{opacity:1;transform:translateY(0)}

  @media(max-width:900px){
    .nav{padding:0 24px}
    .hero{padding:80px 24px}
    .section{padding:80px 24px}
    .exp-grid{grid-template-columns:1fr}
    .dashboard-grid{grid-template-columns:1fr}
    .skills-grid{grid-template-columns:1fr 1fr}
    .contact-grid{grid-template-columns:1fr}
    .metrics-strip{grid-template-columns:1fr 1fr;padding:24px}
    .exp-timeline::before{display:none}
    .exp-item::before{display:none}
  }
</style>
</head>
<body>
<div class="grid-overlay"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── DATA ──────────────────────────────────────────────
const EXPERIENCES = [
  {
    id: 0,
    date: "Jun 2025 – Present",
    role: "AI Specialist & BI Lead",
    company: "NAOS – Bioderma / Institut Esthederm · NORAM",
    location: "Montréal, Canada",
    revenue: "€950M CPG",
    highlights: [
      "Architecting enterprise-wide Generative AI & Agentic workflow integration across North American operations.",
      "Engineering autonomous AI agent networks (n8n, Python, LLMs) for end-to-end data extraction, algorithmic analysis, and executive-ready reporting.",
      "Migrating 30+ manual workstreams into autonomous pipelines — 85% gain in processing capacity.",
      "Governing Power BI ecosystem: development, automation, and enterprise-grade BI governance.",
    ],
    tags: ["n8n", "Python", "LLMs", "Power BI", "Agentic AI", "Executive Reporting"],
  },
  {
    id: 1,
    date: "May 2024 – Jun 2025",
    role: "Business Analyst (VIE)",
    company: "NAOS – Bioderma / Institut Esthederm · USA",
    location: "United States",
    revenue: "€950M CPG",
    highlights: [
      "Built the US Analytics department from zero — full technical governance, data protocols, and reporting frameworks within 6 months.",
      "Deployed 10+ automated Power BI dashboards providing real-time visibility across all business units.",
      "Engineered SKU-level sales forecasting models for Amazon, Walmart, Target, Walgreens, Ulta, and CVS.",
      "Delivered insights directly influencing $XM+ in retail buying decisions.",
    ],
    tags: ["Power BI", "Forecasting", "Retail Analytics", "Amazon", "Walmart", "Data Governance"],
  },
  {
    id: 2,
    date: "Feb 2023 – Feb 2024",
    role: "Business Developer",
    company: "Reech Influence Cloud · SaaS",
    location: "Paris, France",
    revenue: "€13M SaaS",
    highlights: [
      "Secured the company's first Luxury and CAC40 clients — new high-value market segment.",
      "Boosted sales pipeline efficiency by 270% through process redesign and CRM automation.",
      "Designed and implemented structured outbound sales processes from prospecting to close.",
    ],
    tags: ["Sales Strategy", "CRM", "Luxury", "CAC40", "Pipeline Automation"],
  },
  {
    id: 3,
    date: "Mar 2022 – Jul 2022",
    role: "Data Analyst (Master Thesis)",
    company: "NOOS · CSR",
    location: "Madrid, Spain",
    revenue: "€9M CSR",
    highlights: [
      "Built Machine Learning & NLP models to characterize B2B employee engagement via semantic analysis.",
      "Automated processing of 15,000+ data points using Python and Power BI.",
      "Identified critical data gaps enabling targeted B2B offerings.",
    ],
    tags: ["Python", "NLP", "Machine Learning", "Power BI", "B2B Analytics"],
  },
];

const SKILLS = [
  { icon: "📊", name: "Power BI & Data Viz", desc: "Enterprise dashboards, DAX, data governance", level: 5 },
  { icon: "🤖", name: "AI & Agentic Systems", desc: "n8n, LLMs, autonomous pipelines", level: 5 },
  { icon: "🐍", name: "Python & ML", desc: "Forecasting, NLP, data engineering", level: 4 },
  { icon: "⚡", name: "Process Automation", desc: "End-to-end workflow automation", level: 5 },
  { icon: "📈", name: "Sales Forecasting", desc: "SKU-level models, retail analytics", level: 4 },
  { icon: "💼", name: "Revenue Intelligence", desc: "Financial reporting, ROI optimization", level: 5 },
  { icon: "🔗", name: "Systems Integration", desc: "API, Salesforce, HubSpot, Make", level: 4 },
  { icon: "📋", name: "Excel & VBA", desc: "Advanced modeling, automation", level: 5 },
  { icon: "🌐", name: "Business Development", desc: "Sales strategy, CRM, pipeline ops", level: 4 },
];

// ── COMPONENTS ────────────────────────────────────────

function Nav({ active, setActive }) {
  const links = ["about", "impact", "experience", "skills", "contact"];
  return (
    <nav className="nav">
      <div className="nav-logo">ADM // Portfolio</div>
      <div className="nav-links">
        {links.map(l => (
          <button
            key={l}
            className="nav-link"
            onClick={() => document.getElementById(l)?.scrollIntoView({ behavior: "smooth" })}
          >{l}</button>
        ))}
      </div>
    </nav>
  );
}

function Hero() {
  const [typed, setTyped] = useState("");
  const full = "BI Engineer. AI Architect. Revenue Optimizer.";
  useEffect(() => {
    let i = 0;
    const t = setInterval(() => {
      setTyped(full.slice(0, i + 1));
      i++;
      if (i >= full.length) clearInterval(t);
    }, 40);
    return () => clearInterval(t);
  }, []);

  return (
    <section id="about" className="hero">
      <div className="hero-label">Available · France & Canada · Open to relocation</div>
      <h1 className="hero-h1 fade-up">
        Antoine<br />
        <em>de Maintenant</em><br />
        <span className="ghost">—Analyst.</span>
      </h1>
      <p className="hero-sub fade-up">
        I turn complex data into automated intelligence — building systems that generate<br />
        real-time visibility, eliminate manual work, and drive measurable revenue impact.
      </p>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:".8rem",color:"#1E7FD8",marginBottom:"40px"}}>
        {typed}<span className="cursor-blink"></span>
      </div>
      <div className="hero-actions">
        <button className="btn-primary" onClick={() => document.getElementById("contact")?.scrollIntoView({behavior:"smooth"})}>
          Get in Touch →
        </button>
        <button className="btn-secondary" onClick={() => document.getElementById("experience")?.scrollIntoView({behavior:"smooth"})}>
          View Experience
        </button>
      </div>
    </section>
  );
}

function MetricsStrip() {
  const metrics = [
    { value: "85%", label: "Processing Capacity Gained" },
    { value: "270%", label: "Pipeline Efficiency Boost" },
    { value: "30+", label: "Workflows Automated" },
    { value: "6mo", label: "To Build Analytics Dept from 0" },
  ];
  return (
    <div className="metrics-strip reveal" id="metrics">
      {metrics.map((m, i) => (
        <div key={i} className="metric-item">
          <span className="metric-value">{m.value}</span>
          <span className="metric-label">{m.label}</span>
        </div>
      ))}
    </div>
  );
}

function BarChart({ data, animate }) {
  return (
    <div className="bar-chart">
      {data.map((d, i) => (
        <div key={i} className="bar-row">
          <span className="bar-label">{d.label}</span>
          <div className="bar-track">
            <div className="bar-fill" style={{ width: animate ? `${d.pct}%` : "0%" }} />
          </div>
          <span className="bar-val">{d.pct}%</span>
        </div>
      ))}
    </div>
  );
}

function LineChartSVG({ animate }) {
  const points = [12,45,28,68,52,85,70,92,78,95];
  const w = 300, h = 100;
  const xs = points.map((_, i) => (i / (points.length - 1)) * w);
  const ys = points.map(v => h - (v / 100) * h);
  const d = xs.map((x, i) => `${i === 0 ? "M" : "L"}${x},${ys[i]}`).join(" ");
  const area = d + ` L${w},${h} L0,${h} Z`;

  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="chart-svg">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#1E7FD8" stopOpacity=".5" />
          <stop offset="100%" stopColor="#1E7FD8" stopOpacity="0" />
        </linearGradient>

      {xs.map((x, i) => (
        <circle key={i} cx={x} cy={ys[i]} r="3" fill="#1E7FD8" />

    </svg>
  );
}

function RadarChart({ animate }) {
  const skills = [
    { label: "BI / Viz", val: 95 },
    { label: "Automation", val: 90 },
    { label: "Python", val: 82 },
    { label: "Forecasting", val: 88 },
    { label: "Sales Ops", val: 85 },
    { label: "AI Agents", val: 92 },
  ];
  const n = skills.length;
  const cx = 120, cy = 120, r = 90;
  const toXY = (i, pct) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    const dist = (animate ? pct : 0) / 100 * r;
    return { x: cx + dist * Math.cos(angle), y: cy + dist * Math.sin(angle) };
  };
  const labelXY = (i) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    return { x: cx + (r + 18) * Math.cos(angle), y: cy + (r + 18) * Math.sin(angle) };
  };
  const polyPoints = skills.map((s, i) => {
    const p = toXY(i, s.val);
    return `${p.x},${p.y}`;
  }).join(" ");
  const gridLevels = [25, 50, 75, 100];

  return (
    <svg viewBox="0 0 240 240" style={{ width: "100%", maxWidth: 240 }}>
      {gridLevels.map(lvl => {
        const pts = skills.map((_, i) => {
          const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
          return `${cx + (lvl / 100 * r) * Math.cos(angle)},${cy + (lvl / 100 * r) * Math.sin(angle)}`;
        }).join(" ");
        return <polygon key={lvl} points={pts} fill="none" stroke="rgba(30,127,216,.12)" strokeWidth="1" />;
      })}
      {skills.map((_, i) => {
        const p = toXY(i, 100);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(30,127,216,.1)" strokeWidth="1" />;
      })}
      <polygon
        points={polyPoints}
        fill="rgba(30,127,216,.2)"
        stroke="#1E7FD8"
        strokeWidth="1.5"
        style={{ transition: "all 1.5s cubic-bezier(.16,1,.3,1)" }}
      />
      {skills.map((s, i) => {
        const lp = labelXY(i);
        return (
          <text key={i} x={lp.x} y={lp.y}
            textAnchor="middle" dominantBaseline="middle"
            fontSize="8" fill="rgba(232,237,242,.5)"
            fontFamily="JetBrains Mono"
          >{s.label}</text>
        );
      })}
    </svg>
  );
}
