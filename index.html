<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antoine de Maintenant — ⚡ Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS — all themes use CSS vars
   ═══════════════════════════════════════════ */
:root {
  --bg:         #1E1535;
  --bg2:        #2A1D4A;
  --bg3:        #362460;
  --bg-card:    rgba(42,29,74,0.95);
  --text:       #FFFFFF;
  --text-sec:   #D0C4F0;
  --text-dim:   #9B8DCC;
  --text-mute:  #6B5E99;
  --accent1:    #C44EFF;
  --accent2:    #FF3D85;
  --accent3:    #00F5B0;
  --border:     rgba(196,78,255,.35);
  --border-dim: rgba(196,78,255,.18);
  --nav-bg:     rgba(20,13,42,.96);
  --roi-out-bg: rgba(5,2,20,.7);
  --terminal-bg:#020008;
  --log-bg:     #010006;
  --glow1:      rgba(196,78,255,.3);
  --glow2:      rgba(255,61,133,.3);
  --glow3:      rgba(0,245,176,.3);
}
[data-theme=hacker] {
  --bg:#020C08;--bg2:#041A0E;--bg3:#031208;
  --bg-card:rgba(4,26,14,.95);
  --accent1:#00FF88;--accent2:#00FFFF;--accent3:#FFFF00;
  --text:#CCFFE8;--text-sec:#88DDBB;--text-dim:#55AA77;--text-mute:#337755;
  --border:rgba(0,255,136,.3);--border-dim:rgba(0,255,136,.12);
  --nav-bg:rgba(1,8,4,.96);
  --roi-out-bg:rgba(0,10,5,.8);
  --terminal-bg:#010A04;--log-bg:#000802;
  --glow1:rgba(0,255,136,.25);--glow2:rgba(0,255,255,.2);--glow3:rgba(255,255,0,.2);
}
[data-theme=light] {
  --bg:#F4F0FC;--bg2:#E8E0F5;--bg3:#DDD4F0;
  --bg-card:rgba(255,255,255,.97);
  --accent1:#7B0FE0;--accent2:#D4005A;--accent3:#007A55;
  --text:#1A0A2E;--text-sec:#3D2B60;--text-dim:#6B5E99;--text-mute:#9B8DCC;
  --border:rgba(123,15,224,.3);--border-dim:rgba(123,15,224,.15);
  --nav-bg:rgba(244,240,252,.97);
  --roi-out-bg:rgba(232,224,245,.9);
  --terminal-bg:#1A0A2E;--log-bg:#0F0620;
  --glow1:rgba(123,15,224,.15);--glow2:rgba(212,0,90,.12);--glow3:rgba(0,122,85,.12);
}

/* ═══ BASE ═══════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow-x:hidden;cursor:none;transition:background .35s,color .35s}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--accent1),var(--accent2))}

/* ═══ CURSOR ════════════════════════════ */
#cur-o{position:fixed;width:32px;height:32px;border:1.5px solid var(--accent1);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .15s,border-color .2s,width .2s,height .2s;opacity:.7}
#cur-i{position:fixed;width:6px;height:6px;background:var(--accent2);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
body.hovering #cur-o{transform:translate(-50%,-50%) scale(1.8);border-color:var(--accent2)}

/* ═══ BACKGROUND FX ═════════════════════ */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1;opacity:.2}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(139,0,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(139,0,255,.07) 1px,transparent 1px);background-size:60px 60px}
[data-theme=light] .grid-bg{background-image:linear-gradient(rgba(123,15,224,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(123,15,224,.06) 1px,transparent 1px)}
.scanline{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(139,0,255,.12),transparent);z-index:2;pointer-events:none;animation:scan 8s linear infinite}
@keyframes scan{from{top:-2px}to{top:100vh}}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0}

/* ═══ SCROLL PROGRESS ═══════════════════ */
.scroll-bar{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,var(--accent1),var(--accent2),var(--accent3));z-index:9998;box-shadow:0 0 8px var(--glow1)}

/* ═══ NAV ════════════════════════════════
   Single bar: logo | links | theme toggle
   ════════════════════════════════════════ */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  background:var(--nav-bg);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border-dim);
  height:60px;display:flex;align-items:center;
  padding:0 32px;gap:32px;
}
.nav-logo{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--accent1);letter-spacing:3px;white-space:nowrap;flex-shrink:0}
.nav-links{display:flex;gap:4px;flex:1;justify-content:center;flex-wrap:nowrap;overflow:hidden}
.nav-link{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:color .2s,background .2s;border:none;background:none;padding:6px 8px;border-radius:4px;white-space:nowrap}
.nav-link:hover{color:var(--accent2);background:rgba(255,61,133,.08)}
.nav-themes{display:flex;gap:2px;flex-shrink:0;background:rgba(255,255,255,.05);border:1px solid var(--border-dim);border-radius:6px;overflow:hidden}
.theme-btn{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:1px;text-transform:uppercase;padding:7px 11px;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.theme-btn.active{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff}
.theme-btn:not(.active){background:transparent;color:var(--text-dim)}
.theme-btn:not(.active):hover{background:rgba(255,255,255,.07);color:var(--text)}

/* ═══ TICKER ════════════════════════════ */
.ticker{position:relative;z-index:5;background:rgba(196,78,255,.1);border-top:1px solid rgba(196,78,255,.2);border-bottom:1px solid rgba(196,78,255,.2);padding:13px 0;overflow:hidden}
[data-theme=light] .ticker{background:rgba(123,15,224,.08)}
.ticker-inner{display:flex;gap:48px;white-space:nowrap;animation:tickerScroll 28s linear infinite}
@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--accent1);letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:12px}
.ticker-item::before{content:'◆';color:var(--accent2);font-size:.45rem}

/* ═══ HERO ═══════════════════════════════ */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:100px 60px 80px;position:relative;z-index:5;max-width:1400px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:10px;font-family:'Space Mono',monospace;font-size:.58rem;color:var(--accent1);letter-spacing:4px;text-transform:uppercase;border:1px solid var(--border);padding:8px 20px;border-radius:2px;margin-bottom:40px;width:fit-content;animation:borderGlow 4s infinite}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite}
.hero-h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,11vw,10.5rem);line-height:.88;letter-spacing:2px;margin-bottom:8px}
.hero-h1 .accent{color:var(--accent2);animation:rgbShift 6s infinite}
.hero-h1 .outline{-webkit-text-stroke:1.5px var(--border);color:transparent}
.hero-sub{font-size:1.05rem;color:var(--text-sec);max-width:540px;line-height:1.85;margin:28px 0 40px}
.hero-sub span{color:var(--accent1)}
.typewriter-row{font-family:'Space Mono',monospace;font-size:.85rem;color:var(--accent1);margin-bottom:40px;display:flex;align-items:center;gap:8px}
.typewriter-row .prompt{color:var(--text-mute)}
.t-cursor{display:inline-block;width:8px;height:14px;background:var(--accent1);animation:blink 1s infinite;vertical-align:middle;margin-left:2px}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;padding:14px 32px;border:none;cursor:pointer;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);transition:all .2s;position:relative;overflow:hidden;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 40px var(--glow1)}
.btn-secondary{background:rgba(196,78,255,.1);color:var(--text-sec);font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;padding:14px 32px;border:1px solid var(--border);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.btn-secondary:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(255,61,133,.08)}
[data-theme=light] .btn-secondary{background:rgba(123,15,224,.08)}

/* ═══ METRICS BAR ════════════════════════ */
.metrics{position:relative;z-index:5;display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border-dim);background:var(--bg2)}
.metric{padding:36px 28px;text-align:center;border-right:1px solid var(--border-dim)}
.metric:last-child{border-right:none}
.metric-num{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;line-height:1;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block}
.metric-lbl{font-family:'Space Mono',monospace;font-size:.55rem;color:var(--text-sec);letter-spacing:2px;text-transform:uppercase;margin-top:6px;display:block}

/* ═══ SECTIONS ═══════════════════════════ */
.section{padding:90px 60px;position:relative;z-index:5;max-width:1400px;margin:0 auto}
.section-full{padding:90px 0;position:relative;z-index:5;background:var(--bg2)}
.section-full-inner{max-width:1400px;margin:0 auto;padding:0 60px}
.section-eyebrow{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--accent2);letter-spacing:4px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.section-eyebrow::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--accent2),transparent);opacity:.4}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,5vw,4.2rem);line-height:1;letter-spacing:2px;margin-bottom:56px;color:var(--text)}
.section-title em{color:var(--accent1);font-style:normal}

/* ═══ DASHBOARD ══════════════════════════ */
.dashboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.kpi-box{padding:20px;border:1px solid var(--border-dim);border-radius:10px;background:var(--bg-card);backdrop-filter:blur(10px);transition:all .25s}
.kpi-box:hover{border-color:var(--accent1);transform:translateY(-3px);box-shadow:0 8px 30px var(--glow1)}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--accent1);line-height:1}
.kpi-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.kpi-delta{font-size:11px;color:var(--accent3);margin-top:3px;font-family:'Space Mono',monospace}
.chart-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
.chart-box{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:10px;padding:22px}
.chart-title{font-size:11px;font-weight:600;color:var(--text-dim);margin-bottom:14px;letter-spacing:2px;text-transform:uppercase;font-family:'Space Mono',monospace}
.chart-wrap{position:relative;height:200px}

/* ═══ PIPELINE ═══════════════════════════ */
.pipeline-wrap{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:12px;padding:36px}
.pipeline-stages{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:28px;gap:0}
.p-node{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 16px;border-radius:10px;border:2px solid var(--border-dim);background:var(--bg);transition:all .4s;min-width:100px;text-align:center}
.p-node.running{border-color:var(--accent1);box-shadow:0 0 20px var(--glow1);background:rgba(196,78,255,.08)}
.p-node.done{border-color:var(--accent3);box-shadow:0 0 15px var(--glow3)}
.p-node-icon{font-size:24px}
.p-node-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim)}
.p-node-detail{font-size:9px;color:var(--text-mute);font-family:'Space Mono',monospace}
.p-connector{width:36px;height:3px;background:var(--border-dim);flex-shrink:0;position:relative}
.p-connector-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent1),var(--accent3));transition:width .5s}
.pipeline-log{background:var(--log-bg);border:1px solid var(--border-dim);border-radius:8px;padding:14px;font-family:'Space Mono',monospace;font-size:11.5px;height:130px;overflow-y:auto;margin-bottom:18px;color:var(--accent3)}
.log-line{margin-bottom:3px;line-height:1.6}
.run-btn{display:block;margin:0 auto;padding:13px 44px;background:linear-gradient(135deg,var(--accent1),var(--accent2));border:none;border-radius:8px;color:#fff;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .3s}
.run-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px var(--glow1)}
.run-btn:disabled{opacity:.5;cursor:not-allowed}

/* ═══ EXPERIENCE ═════════════════════════ */
.exp-filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border-dim);background:transparent;color:var(--text-dim);font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;transition:all .2s;letter-spacing:1px}
.filter-btn.active,.filter-btn:hover{background:var(--accent1);color:#fff;border-color:var(--accent1)}
.exp-layout{display:grid;grid-template-columns:260px 1fr;gap:40px}
.exp-nav{display:flex;flex-direction:column}
.exp-nav-item{padding:18px 20px;cursor:pointer;transition:all .2s;border-left:2px solid transparent;border-bottom:1px solid var(--border-dim)}
.exp-nav-item:last-child{border-bottom:none}
.exp-nav-item:hover{background:rgba(196,78,255,.06)}
.exp-nav-item.active{background:rgba(196,78,255,.1);border-left-color:var(--accent2)}
.exp-nav-date{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.exp-nav-role{font-size:.88rem;font-weight:700;margin-bottom:3px;color:var(--text)}
.exp-nav-co{font-size:.75rem;color:var(--text-dim)}
.exp-detail{background:var(--bg-card);border:1px solid var(--border-dim);padding:36px;position:sticky;top:72px;border-radius:8px}
.exp-detail-role{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;margin-bottom:5px;color:var(--text)}
.exp-detail-meta{font-family:'Space Mono',monospace;font-size:.56rem;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;display:flex;gap:12px;flex-wrap:wrap}
.exp-bullets{list-style:none;display:flex;flex-direction:column;gap:14px}
.exp-bullets li{display:flex;gap:10px;font-size:.9rem;color:var(--text-sec);line-height:1.7}
.exp-bullets li::before{content:'→';color:var(--accent1);flex-shrink:0;margin-top:2px}
.exp-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:24px}
.exp-tag{background:rgba(196,78,255,.1);border:1px solid var(--border-dim);color:var(--accent1);font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:2px;text-transform:uppercase;padding:4px 9px;border-radius:2px}

/* ═══ SKILLS ═════════════════════════════ */
.skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.skill-card{background:var(--bg-card);border:1px solid var(--border-dim);padding:22px;transition:all .25s;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%)}
.skill-card:hover{border-color:var(--accent1);transform:translateY(-4px);box-shadow:0 12px 36px var(--glow1)}
.skill-icon{font-size:1.6rem;margin-bottom:12px}
.skill-name{font-size:.95rem;font-weight:700;margin-bottom:5px;color:var(--text)}
.skill-desc{font-size:.76rem;color:var(--text-sec);line-height:1.55}
.skill-bar{height:2px;background:var(--border-dim);margin-top:14px;overflow:hidden}
.skill-fill{height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2))}
.skill-pct{font-family:'Space Mono',monospace;font-size:.56rem;color:var(--accent1);margin-top:6px;text-align:right}

/* ═══ STACK ══════════════════════════════ */
.stack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.stack-card{background:var(--bg-card);border:1px solid var(--border-dim);padding:20px 14px;text-align:center;transition:all .25s;border-radius:6px;position:relative;overflow:hidden}
.stack-card:hover{border-color:var(--accent1);transform:translateY(-5px);box-shadow:0 14px 36px var(--glow1)}
.stack-emoji{font-size:1.5rem;margin-bottom:10px;display:block;transition:transform .25s}
.stack-card:hover .stack-emoji{transform:scale(1.15)}
.stack-name{font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:3px}
.stack-cat{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase}
.stack-level{position:absolute;top:8px;right:8px;font-family:'Space Mono',monospace;font-size:.44rem;color:var(--accent3);background:rgba(0,245,176,.1);border:1px solid rgba(0,245,176,.2);padding:2px 5px;border-radius:2px}

/* ═══ ROI CALCULATOR ═════════════════════ */
.roi-wrap{background:var(--bg-card);border:1px solid var(--border-dim);padding:40px;border-radius:8px;position:relative;overflow:hidden}
.roi-wrap::before{content:'// ROI CALCULATOR';position:absolute;top:16px;right:20px;font-family:'Space Mono',monospace;font-size:.46rem;color:var(--text-mute);letter-spacing:3px}
.roi-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start}
.roi-inputs{display:flex;flex-direction:column;gap:24px}
.roi-input-group label{display:block;font-family:'Space Mono',monospace;font-size:.56rem;color:var(--text-sec);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.roi-val-badge{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--accent1);margin-left:10px}
input[type=range]{width:100%;appearance:none;height:3px;background:var(--border-dim);outline:none;border-radius:2px;margin-top:4px}
input[type=range]::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:50%;background:linear-gradient(135deg,var(--accent1),var(--accent2));cursor:pointer}
/* ROI output box — always readable in all themes */
.roi-out{background:var(--roi-out-bg);border:1px solid var(--border-dim);padding:28px;display:flex;flex-direction:column;gap:20px;border-radius:6px}
.roi-metric{border-bottom:1px solid var(--border-dim);padding-bottom:16px}
.roi-metric:last-child{border:none;padding:0}
.roi-metric-lbl{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.roi-metric-val{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;line-height:1;letter-spacing:2px}
.roi-metric-val.pink{color:var(--accent2)}
.roi-metric-val.purple{color:var(--accent1)}
.roi-metric-val.green{color:var(--accent3)}
.roi-helper{font-size:.68rem;color:var(--text-dim);margin-top:4px}
.roi-savings-box{background:rgba(0,245,176,.07);border:1px solid rgba(0,245,176,.18);padding:18px;border-radius:6px}

/* ═══ TERMINAL ═══════════════════════════ */

// CURSOR
const co=document.getElementById('cur-o'),ci=document.getElementById('cur-i');
let mx=0,my=0,ox=0,oy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;ci.style.left=mx+'px';ci.style.top=my+'px'});
(function anim(){ox+=(mx-ox)*.12;oy+=(my-oy)*.12;co.style.left=ox+'px';co.style.top=oy+'px';requestAnimationFrame(anim)})();
document.addEventListener('mouseover',e=>{if(e.target.closest('a,button,[role=button]'))document.body.classList.add('hovering');else document.body.classList.remove('hovering')});

// PARTICLES
(function(){
  const c=document.getElementById('particles'),ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight}resize();window.addEventListener('resize',resize);
  const pts=Array.from({length:70},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.4+.4}));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    const th=document.body.getAttribute('data-theme');
    const col=th==='hacker'?'0,255,136':th==='light'?'123,15,224':'196,78,255';
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${col},.5)`;ctx.fill()});
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<110){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(${col},${.15*(1-d/110)})`;ctx.lineWidth=.5;ctx.stroke()}}));
    requestAnimationFrame(draw);
  }draw();
})();

// SCROLL PROGRESS
window.addEventListener('scroll',()=>{const d=document.documentElement;document.getElementById('sbar').style.width=(d.scrollTop/(d.scrollHeight-d.clientHeight)*100)+'%'});

(function(){const s=[38,38,40,40,37,39,37,39,66,65];let p=0;document.addEventListener('keydown',e=>{e.keyCode===s[p]?p++:p=0;if(p===s.length){p=0;window.konamiCb&&window.konamiCb()}})})();
</script>

   PIPELINE COMPONENT
══════════════════════════════════════ */
function Pipeline(){
  const [stage,setStage]=useState(-1);
  const [fills,setFills]=useState([0,0,0,0,0]);
  const [logs,setLogs]=useState([{t:'READY',m:'Pipeline idle. Press RUN to execute.'}]);
  const [running,setRunning]=useState(false);
  const logRef=useRef();
  const MSGS=[['INIT','Connecting to Retail Partner API...'],['FETCH','Downloading 847 rows of POS data...'],['CLEAN','Removing nulls, normalizing 32 SKUs...'],['MODEL','Running Prophet forecast (30d) | MAPE: 4.2%'],['EMBED','Refreshing Power BI · 12 reports updated'],['DONE','✓ Delivered to 12 stakeholders | 00:05:23']];
  async function run(){
    if(running)return;setRunning(true);setStage(-1);setFills([0,0,0,0,0]);setLogs([]);
    for(let i=0;i<6;i++){
      await new Promise(r=>setTimeout(r,900));
      setStage(i);setLogs(l=>[...l,{t:MSGS[i][0],m:MSGS[i][1]}]);
      setTimeout(()=>{if(logRef.current)logRef.current.scrollTop=9999},50);
      if(i<5){await new Promise(r=>setTimeout(r,350));setFills(f=>{const n=[...f];n[i]=100;return n})}
    }
    setRunning(false);
  }
  return(
    <div className="pipeline-wrap reveal">
      <div className="pipeline-stages">
        {PIPELINE_STAGES.map((s,i)=>(
          <React.Fragment key={i}>
            <div className={`p-node${stage===i?' running':stage>i?' done':''}`}>
              <span className="p-node-icon">{stage>i?'✅':s.icon}</span>
              <span className="p-node-label">{s.label}</span>
              <span className="p-node-detail">{s.detail}</span>
            </div>
            {i<5&&<div className="p-connector"><div className="p-connector-fill" style={{width:fills[i]+'%'}}/></div>}
          </React.Fragment>
        ))}
      </div>
      <div className="pipeline-log" ref={logRef}>
        {logs.map((l,i)=><div key={i} className="log-line"><span style={{color:'var(--text-dim)'}}>[{l.t}]</span> {l.m}</div>)}
      </div>
      <button className="run-btn" onClick={run} disabled={running}>{running?'⟳ RUNNING...':'▶ RUN PIPELINE'}</button>
    </div>
  );
}

/* ══════════════════════════════════════
   ROI CALCULATOR
══════════════════════════════════════ */
function ROICalc(){
  const [analysts,setA]=useState(3);
  const [hours,setH]=useState(15);
  const [rate,setR]=useState(45);
  const [err,setE]=useState(12);
  const wkH=analysts*hours;
  const waste=wkH*rate*52;
  const errCost=(err/100)*waste*.8;
  const total=waste+errCost;
  const after=total*.12;
  const savings=total-after;
  const roi=(savings/80000*100).toFixed(0);
  const fmt=n=>n>=1000?`$${(n/1000).toFixed(0)}K`:`$${Math.round(n)}`;
  const sliders=[
    {label:"Analysts on manual reports",val:analysts,set:setA,min:1,max:20,unit:"people"},
    {label:"Hours / week per analyst",val:hours,set:setH,min:2,max:40,unit:"h/wk"},
    {label:"Avg hourly cost (salary + overhead)",val:rate,set:setR,min:20,max:150,unit:"$/h"},
    {label:"Error rate in manual reporting",val:err,set:setE,min:1,max:40,unit:"%"},
  ];
  return(
    <div className="roi-wrap reveal">
      <div className="roi-grid">
        <div className="roi-inputs">
          <h3 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.6rem",letterSpacing:"2px",marginBottom:"6px",color:"var(--text)"}}>What's your data ops costing you?</h3>
          <p style={{fontSize:".82rem",color:"var(--text-sec)",lineHeight:"1.75",marginBottom:"20px"}}>Move the sliders. Watch the pain materialize. Then we talk.</p>
          {sliders.map((s,i)=>(
            <div key={i} className="roi-input-group">
              <label>{s.label} <span className="roi-val-badge">{s.val} {s.unit}</span></label>
              <input type="range" min={s.min} max={s.max} value={s.val} onChange={e=>s.set(+e.target.value)}/>
            </div>
          ))}
        </div>
        <div className="roi-out">
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:".52rem",color:"var(--text-dim)",letterSpacing:"3px",textTransform:"uppercase",marginBottom:"8px"}}>// Automation impact analysis</div>
          <div className="roi-metric">
            <div className="roi-metric-lbl">Annual cost of manual reporting</div>
            <div className="roi-metric-val pink">{fmt(waste)}</div>
            <div className="roi-helper">{wkH}h/week × {analysts} analyst{analysts>1?'s':''} × 52wks</div>
          </div>
          <div className="roi-metric">
            <div className="roi-metric-lbl">+ Hidden error cost ({err}%)</div>
            <div className="roi-metric-val purple">{fmt(errCost)}</div>
          </div>
          <div className="roi-metric">
            <div className="roi-metric-lbl">Total annual pain</div>
            <div className="roi-metric-val pink" style={{fontSize:"3.2rem"}}>{fmt(total)}</div>
          </div>
          <div className="roi-metric">
            <div className="roi-metric-lbl">After automation (12% residual)</div>
            <div className="roi-metric-val" style={{color:"var(--text-sec)",fontSize:"1.7rem"}}>{fmt(after)}</div>
          </div>
          <div className="roi-savings-box">
            <div className="roi-metric-lbl">🚀 Annual savings unlocked</div>
            <div className="roi-metric-val green" style={{fontSize:"2.8rem"}}>{fmt(savings)}</div>
            <div style={{fontSize:".65rem",color:"var(--accent3)",marginTop:"6px",fontFamily:"'Space Mono',monospace"}}>ROI on hiring Antoine: ~{roi}%</div>
          </div>
          <div style={{fontSize:".6rem",color:"var(--text-mute)",fontFamily:"'Space Mono',monospace",fontStyle:"italic"}}>// Conservative estimate. Real results may cause audible gasping.</div>
        </div>
      </div>
    </div>
  );
}
