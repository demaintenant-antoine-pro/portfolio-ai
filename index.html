<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antoine de Maintenant — ⚡ Interactive Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ─── DESIGN TOKENS ─────────────────────────────────────────── */
:root {
  --bg:        #1E1535;   /* dark purple — readable, not pitch black */
  --bg2:       #2A1D4A;   /* cards — clearly distinct from bg */
  --bg3:       #362460;   /* hover */
  --text:      #FFFFFF;   /* pure white */
  --text-sec:  #D0C4F0;   /* very light lavender — high contrast */
  --text-dim:  #9B8DCC;   /* still readable */
  --text-mute: #6B5E99;   /* decorative only */
  --accent1:   #C44EFF;
  --accent2:   #FF3D85;
  --accent3:   #00F5B0;
  --border:    rgba(196,78,255,.3);
  --border-dim:rgba(196,78,255,.18);
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:#1E1535;color:#FFFFFF;
  font-family:'Space Grotesk',sans-serif;
  overflow-x:hidden;cursor:none;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--accent1),var(--accent2))}

/* CURSOR */
#cursor-outer{
  position:fixed;width:32px;height:32px;border:1.5px solid rgba(200,85,255,.7);
  border-radius:50%;pointer-events:none;z-index:9999;
  transition:transform .15s ease, border-color .2s;
  transform:translate(-50%,-50%);
}
#cursor-inner{
  position:fixed;width:6px;height:6px;background:var(--accent2);
  border-radius:50%;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
}
body.hovering #cursor-outer{transform:translate(-50%,-50%) scale(1.8);border-color:var(--accent2)}

/* NOISE OVERLAY */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:1;opacity:.25;
}

/* GRID */
.grid-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(139,0,255,.08) 1px,transparent 1px),
    linear-gradient(90deg,rgba(139,0,255,.08) 1px,transparent 1px);
  background-size:60px 60px;
}

/* SCANLINE */
.scanline{
  position:fixed;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(139,0,255,.15),transparent);
  z-index:2;pointer-events:none;animation:scan 8s linear infinite;
}
@keyframes scan{from{top:-2px}to{top:100vh}}

#particles{position:fixed;inset:0;pointer-events:none;z-index:0}

/* GLITCH */
@keyframes glitch1{
  0%,100%{clip-path:inset(0 0 98% 0);transform:translate(-3px,0)}
  20%{clip-path:inset(30% 0 50% 0);transform:translate(3px,0)}
  40%{clip-path:inset(70% 0 10% 0);transform:translate(-3px,0)}
  60%{clip-path:inset(10% 0 80% 0);transform:translate(3px,0)}
  80%{clip-path:inset(50% 0 30% 0);transform:translate(-3px,0)}
}
@keyframes glitch2{
  0%,100%{clip-path:inset(98% 0 0 0);transform:translate(3px,0)}
  20%{clip-path:inset(10% 0 70% 0);transform:translate(-3px,0)}
  40%{clip-path:inset(80% 0 10% 0);transform:translate(3px,0)}
  60%{clip-path:inset(40% 0 40% 0);transform:translate(-3px,0)}
  80%{clip-path:inset(0 0 90% 0);transform:translate(3px,0)}
}
.glitch-wrap{position:relative;display:inline-block}
.glitch-wrap::before,.glitch-wrap::after{
  content:attr(data-text);position:absolute;top:0;left:0;right:0;font:inherit;
}
.glitch-wrap::before{color:var(--accent2);animation:glitch1 4s infinite linear;opacity:.8}
.glitch-wrap::after{color:var(--accent1);animation:glitch2 4s .5s infinite linear;opacity:.8}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes rgbShift{
  0%{text-shadow:2px 0 var(--accent2),-2px 0 var(--accent1)}
  33%{text-shadow:-2px 0 var(--accent2),2px 0 #00F5FF}
  66%{text-shadow:2px 0 #00F5FF,-2px 0 var(--accent2)}
  100%{text-shadow:2px 0 var(--accent2),-2px 0 var(--accent1)}
}
@keyframes borderGlow{
  0%,100%{box-shadow:0 0 15px rgba(200,85,255,.35),inset 0 0 15px rgba(200,85,255,.06)}
  50%{box-shadow:0 0 30px rgba(255,61,133,.45),inset 0 0 30px rgba(255,61,133,.1)}
}
@keyframes shimmer{from{background-position:-200% 0}to{background-position:200% 0}}
@keyframes countUp{from{opacity:0;transform:scale(.5) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}

/* MODE TOGGLE */
.mode-toggle{
  position:fixed;top:20px;right:24px;z-index:200;
  display:flex;background:rgba(255,255,255,.06);
  border:1px solid var(--border);border-radius:6px;overflow:hidden;
}
.mode-btn{
  font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:2px;
  text-transform:uppercase;padding:10px 18px;border:none;cursor:pointer;transition:all .2s;
}
.mode-btn.active{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff}
.mode-btn:not(.active){background:transparent;color:var(--text-dim)}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(30,21,53,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border-dim);
  padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{
  font-family:'Space Mono',monospace;font-size:.7rem;
  color:var(--accent1);letter-spacing:3px;
}
.nav-links{display:flex;gap:28px}
.nav-link{
  font-family:'Space Mono',monospace;font-size:.6rem;
  color:var(--text-sec);letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:color .2s;border:none;background:none;
}
.nav-link:hover{color:var(--accent2)}

/* HERO */
.hero{
  min-height:100vh;display:flex;flex-direction:column;
  justify-content:center;padding:100px 60px 80px;
  position:relative;z-index:5;max-width:1400px;margin:0 auto;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:10px;
  font-family:'Space Mono',monospace;font-size:.6rem;
  color:var(--accent1);letter-spacing:4px;text-transform:uppercase;
  border:1px solid rgba(200,85,255,.35);padding:8px 20px;
  border-radius:2px;margin-bottom:40px;width:fit-content;
  animation:borderGlow 4s infinite;
}
.hero-badge::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--accent1);animation:pulse 2s infinite;
}
.hero-h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(4rem,12vw,11rem);line-height:.88;
  letter-spacing:2px;position:relative;z-index:1;margin-bottom:8px;
}
.hero-h1 .accent{color:var(--accent2);animation:rgbShift 6s infinite}
.hero-h1 .outline{
  /* was color:transparent with barely-visible stroke — now solid dim */
  -webkit-text-stroke:1.5px rgba(200,85,255,.35);
  color:transparent;
}
.hero-sub{
  font-size:1.1rem;color:var(--text-sec);
  max-width:540px;line-height:1.85;margin:28px 0 48px;
}
.hero-sub span{color:var(--accent1)}

.hero-cta-row{display:flex;gap:12px;flex-wrap:wrap}
.cta-primary{
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  color:#fff;font-family:'Space Mono',monospace;font-size:.65rem;
  letter-spacing:2px;text-transform:uppercase;
  padding:14px 36px;border:none;cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);
  transition:all .2s;position:relative;overflow:hidden;
}
.cta-primary::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  transform:translateX(-100%);
}
.cta-primary:hover::after{transition:transform .5s;transform:translateX(100%)}
.cta-primary:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(200,85,255,.5)}
.cta-secondary{
  background:rgba(200,85,255,.1);color:var(--text-sec);
  font-family:'Space Mono',monospace;font-size:.65rem;
  letter-spacing:2px;text-transform:uppercase;padding:14px 36px;
  border:1px solid rgba(200,85,255,.3);cursor:pointer;transition:all .2s;
}
.cta-secondary:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(255,61,133,.08)}

/* TICKER */
.ticker{
  position:relative;z-index:5;
  background:rgba(196,78,255,.1);
  border-top:1px solid rgba(196,78,255,.25);
  border-bottom:1px solid rgba(196,78,255,.25);
  padding:14px 0;overflow:hidden;
}
.ticker-inner{
  display:flex;gap:48px;white-space:nowrap;
  animation:tickerScroll 25s linear infinite;
}
@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{
  font-family:'Space Mono',monospace;font-size:.62rem;
  color:rgba(210,160,255,.95);letter-spacing:3px;text-transform:uppercase;
  display:flex;align-items:center;gap:12px;
}
.ticker-item::before{content:'◆';color:var(--accent2);font-size:.5rem}

/* SECTION */
.section{padding:100px 60px;position:relative;z-index:5;max-width:1400px;margin:0 auto}
.section-eyebrow{
  font-family:'Space Mono',monospace;font-size:.6rem;
  color:var(--accent2);letter-spacing:4px;text-transform:uppercase;
  margin-bottom:16px;display:flex;align-items:center;gap:12px;
}
.section-eyebrow::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,61,133,.4),transparent)}
.section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.5rem,5vw,4.5rem);line-height:1;letter-spacing:2px;margin-bottom:64px;
}
.section-title em{color:var(--accent1);font-style:normal}

/* ROI CARD */
.roi-card{
  background:var(--bg2);
  border:1px solid rgba(200,85,255,.2);
  padding:48px;position:relative;overflow:hidden;
}
.roi-card::before{
  content:'ROI CALCULATOR';position:absolute;top:20px;right:20px;
  font-family:'Space Mono',monospace;font-size:.5rem;
  color:rgba(200,85,255,.35);letter-spacing:4px;
}
.roi-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start}
.roi-inputs{display:flex;flex-direction:column;gap:28px}
.roi-input-group label{
  display:block;font-family:'Space Mono',monospace;font-size:.6rem;
  color:var(--text-sec);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;
}
.roi-input-group input[type=range]{
  width:100%;appearance:none;height:3px;
  background:rgba(200,85,255,.25);outline:none;border-radius:2px;
}
.roi-input-group input[type=range]::-webkit-slider-thumb{
  appearance:none;width:16px;height:16px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent1),var(--accent2));cursor:pointer;
}
.roi-val{
  font-family:'Space Mono',monospace;font-size:.85rem;
  color:var(--accent1);margin-left:12px;
}
.roi-output{
  background:rgba(5,2,15,.5);border:1px solid rgba(200,85,255,.15);
  padding:32px;display:flex;flex-direction:column;gap:24px;
}
.roi-metric{border-bottom:1px solid rgba(200,85,255,.1);padding-bottom:20px}
.roi-metric:last-child{border:none;padding:0}
.roi-metric-label{
  font-family:'Space Mono',monospace;font-size:.58rem;
  color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;
}
.roi-metric-value{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1;letter-spacing:2px}
.roi-metric-value.green{color:var(--accent3)}
.roi-metric-value.pink{color:var(--accent2)}
.roi-metric-value.purple{color:var(--accent1)}

/* ROI helper text */
.roi-helper{font-size:.72rem;color:var(--text-dim);margin-top:6px}

/* EXPERIENCE */
.exp-grid{display:grid;grid-template-columns:300px 1fr;gap:48px}
.exp-nav{display:flex;flex-direction:column}
.exp-nav-item{
  padding:20px 24px;cursor:pointer;transition:all .2s;
  border-left:2px solid transparent;
}
.exp-nav-item:hover{background:rgba(200,85,255,.07)}
.exp-nav-item.active{background:rgba(200,85,255,.1);border-left-color:var(--accent2)}
.exp-nav-date{
  font-family:'Space Mono',monospace;font-size:.55rem;
  color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;
}
.exp-nav-role{font-size:.92rem;font-weight:700;margin-bottom:4px;color:var(--text)}
.exp-nav-co{font-size:.78rem;color:var(--text-dim)}
.exp-detail{
  background:var(--bg2);border:1px solid rgba(200,85,255,.15);
  padding:40px;position:sticky;top:80px;
}
.exp-detail-role{
  font-family:'Bebas Neue',sans-serif;font-size:2.2rem;
  letter-spacing:2px;margin-bottom:6px;color:var(--text);
}
.exp-detail-meta{
  font-family:'Space Mono',monospace;font-size:.6rem;
  color:var(--accent2);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:32px;display:flex;gap:16px;flex-wrap:wrap;
}
.exp-bullets{list-style:none;display:flex;flex-direction:column;gap:16px}
.exp-bullets li{
  display:flex;gap:12px;font-size:.92rem;
  color:var(--text-sec);line-height:1.7;
}
.exp-bullets li::before{content:'→';color:var(--accent1);flex-shrink:0;margin-top:3px}
.exp-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:28px}
.exp-tag{
  background:rgba(200,85,255,.1);border:1px solid rgba(200,85,255,.25);
  color:var(--accent1);font-family:'Space Mono',monospace;
  font-size:.52rem;letter-spacing:2px;text-transform:uppercase;padding:5px 10px;
}

/* SKILL CARDS */
.skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.skill-card{
  background:var(--bg2);border:1px solid rgba(200,85,255,.15);
  padding:24px;transition:all .25s;cursor:default;
  clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,0 100%);
}
.skill-card:hover{
  background:var(--bg3);border-color:rgba(200,85,255,.4);
  transform:translateY(-4px);box-shadow:0 12px 40px rgba(200,85,255,.18);
}
.skill-icon{font-size:1.8rem;margin-bottom:14px;filter:drop-shadow(0 0 8px rgba(200,85,255,.5))}
.skill-name{font-size:.98rem;font-weight:700;margin-bottom:6px;color:var(--text)}
.skill-desc{font-size:.78rem;color:var(--text-sec);line-height:1.55}
.skill-bar{height:2px;background:rgba(200,85,255,.15);margin-top:16px;position:relative;overflow:hidden}
.skill-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2));
  animation:shimmer 2s infinite;background-size:200% 100%;
}
.skill-pct{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--accent1);margin-top:8px;text-align:right}

/* TERMINAL */
.terminal{
  background:#020008;border:1px solid rgba(200,85,255,.25);
  font-family:'Space Mono',monospace;animation:borderGlow 6s infinite;
}
.terminal-header{
  background:rgba(200,85,255,.08);border-bottom:1px solid rgba(200,85,255,.15);
  padding:12px 20px;display:flex;align-items:center;gap:10px;
}
.t-dot{width:10px;height:10px;border-radius:50%}
.t-red{background:#FF5F57}
.t-yellow{background:#FEBC2E}
.t-green{background:#28C840}
.terminal-path{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--text-dim);margin-left:12px;letter-spacing:2px}
.terminal-body{padding:24px 28px;display:flex;flex-direction:column;gap:8px}
.t-line{font-size:.74rem;line-height:1.75}
.t-prompt{color:var(--accent1)}
.t-cmd{color:var(--accent3)}
.t-out{color:var(--text-sec)}           /* was rgba(.4) — now clearly readable */
.t-highlight{color:var(--accent2);font-weight:700}
.t-comment{color:var(--text-dim)}       /* was rgba(184,63,255,.4) — now lighter */
.t-cursor{
  display:inline-block;width:8px;height:14px;
  background:var(--accent1);animation:blink 1s infinite;vertical-align:middle;
}

/* EASTER EGG */
.modal-overlay{
  position:fixed;inset:0;background:rgba(10,5,21,.95);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  animation:fadeIn .3s ease;
}
.modal{
  background:var(--bg2);border:1px solid rgba(200,85,255,.35);
  padding:48px;max-width:560px;text-align:center;
  animation:countUp .5s cubic-bezier(.16,1,.3,1);
  box-shadow:0 0 80px rgba(200,85,255,.25);
}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:3px;color:var(--accent2);margin-bottom:16px}
.modal p{font-size:.88rem;color:var(--text-sec);line-height:1.8;margin-bottom:28px}
.modal-close{
  background:rgba(200,85,255,.12);border:1px solid rgba(200,85,255,.35);
  color:var(--accent1);font-family:'Space Mono',monospace;font-size:.65rem;
  letter-spacing:2px;text-transform:uppercase;padding:12px 32px;cursor:pointer;transition:all .2s;
}
.modal-close:hover{background:rgba(255,61,133,.12);border-color:var(--accent2);color:var(--accent2)}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start}
.contact-card{
  background:var(--bg2);border:1px solid rgba(200,85,255,.15);
  padding:32px;transition:all .25s;
}
.contact-card:hover{border-color:rgba(255,61,133,.4);transform:translateY(-3px)}
.contact-icon{font-size:1.5rem;margin-bottom:16px}
.contact-label{
  font-family:'Space Mono',monospace;font-size:.58rem;
  color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;
}
.contact-value{font-size:.92rem;color:var(--text)}

.konami-hint{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font-family:'Space Mono',monospace;font-size:.5rem;
  color:rgba(200,85,255,.25);letter-spacing:3px;z-index:50;pointer-events:none;
}

/* WORLD STRIP */
.world-strip{
  position:relative;z-index:5;
  border-top:1px solid rgba(200,85,255,.1);
  border-bottom:1px solid rgba(200,85,255,.1);
  padding:28px 0;overflow:hidden;background:rgba(200,85,255,.03);
}
.world-inner{
  display:flex;gap:48px;align-items:center;justify-content:center;flex-wrap:wrap;padding:0 48px;
}
.country{text-align:center}
.country-flag{font-size:1.8rem;filter:drop-shadow(0 0 8px rgba(200,85,255,.4))}
.country-name{
  font-family:'Space Mono',monospace;font-size:.52rem;
  color:var(--text-dim);letter-spacing:2px;margin-top:4px;
}

/* FOOTER */
.footer{
  position:relative;z-index:5;text-align:center;
  padding:48px;border-top:1px solid rgba(200,85,255,.1);
  font-family:'Space Mono',monospace;font-size:.6rem;
  color:var(--text-dim);letter-spacing:2px;
}
.footer .credit{color:rgba(200,85,255,.5);margin-top:8px;display:block}

/* RECRUITER MODE */
.recruiter-mode .hero-h1{font-size:clamp(3rem,8vw,7rem)}
.recruiter-mode .section-title{font-size:clamp(2rem,4vw,3.5rem)}
.recruiter-mode .hero-badge{animation:none}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(24px);transition:all .7s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:translateY(0)}

/* METRICS */
.metrics{
  position:relative;z-index:5;
  display:grid;grid-template-columns:repeat(4,1fr);
  border:1px solid var(--border-dim);
  background:var(--bg2);
}
.metric{padding:40px 32px;text-align:center;border-right:1px solid var(--border-dim)}
.metric:last-child{border:none}
.metric-num{
  font-family:'Bebas Neue',sans-serif;font-size:3.5rem;line-height:1;letter-spacing:2px;
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;
}
.metric-lbl{
  font-family:'Space Mono',monospace;font-size:.58rem;

<script>
const outer = document.getElementById('cursor-outer');
const inner = document.getElementById('cursor-inner');
let mx=0,my=0,ox=0,oy=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  inner.style.left=mx+'px';inner.style.top=my+'px';
});
function animateCursor(){
  ox+=(mx-ox)*.12;oy+=(my-oy)*.12;
  outer.style.left=ox+'px';outer.style.top=oy+'px';
  requestAnimationFrame(animateCursor);
}
animateCursor();
document.querySelectorAll('a,button,[role=button]').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
});

// PARTICLES
(function(){
  const c=document.getElementById('particles');
  const ctx=c.getContext('2d');
  c.width=innerWidth;c.height=innerHeight;
  window.addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight;});
  const pts=Array.from({length:80},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
    r:Math.random()*1.5+.5,
    color:Math.random()>.5?'rgba(196,78,255,':'rgba(255,61,133,',
  }));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;
      if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color+'.65)';ctx.fill();
    });
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<100){
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(200,85,255,${(1-d/100)*.2})`;
        ctx.lineWidth=.5;ctx.stroke();
      }
    }));
    requestAnimationFrame(draw);
  }
  draw();
})();

// KONAMI CODE
(function(){
  const seq=[38,38,40,40,37,39,37,39,66,65];
  let pos=0;
  document.addEventListener('keydown',e=>{
    if(e.keyCode===seq[pos]){pos++;if(pos===seq.length){pos=0;window.konamiCallback&&window.konamiCallback();}}
    else pos=0;
  });
})();

// SCROLL PROGRESS BAR
(function(){
  const bar = document.createElement('div');
  bar.className = 'scroll-progress';
  document.body.appendChild(bar);
  window.addEventListener('scroll', () => {
    const pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
    bar.style.width = pct + '%';
  });
})();

</script>

                <div key={i} className="ticker-item">{t}</div>
              ))}
            </div>
          ))}
        </div>
      </div>

      <div className="metrics reveal">
        {[
          {num:'85%',lbl:'Processing Capacity Gained'},
          {num:'270%',lbl:'Pipeline Efficiency Boost'},
          {num:'30+',lbl:'Workflows Automated'},
          {num:'6mo',lbl:'Built Analytics Dept from 0'},
        ].map((m,i) => (
          <div key={i} className="metric">
            <span className="metric-num">{m.num}</span>
            <span className="metric-lbl">{m.lbl}</span>
          </div>
        ))}
      </div>

      <section id="roi" className="section">
        <div className="section-eyebrow">ROI Calculator</div>
        <h2 className="section-title">Find out what <em>not</em> hiring me costs.</h2>
        <ROICalc />
      </section>

      <div style={{maxWidth:'1400px',margin:'0 auto',padding:'0 60px 60px',position:'relative',zIndex:5}}>
        <div className="terminal reveal">
          <div className="terminal-header">
            <div className="t-dot t-red"></div>
            <div className="t-dot t-yellow"></div>
            <div className="t-dot t-green"></div>
            <span className="terminal-path">antoine@automation-engine — forecast.py</span>
          </div>
          <div className="terminal-body">
            <div className="t-line"><span className="t-prompt">$</span> <span className="t-cmd">python forecast_engine.py</span> <span className="t-out">--retailer walmart --sku-level --horizon 13w --output executive_deck</span></div>
            <div className="t-line"><span className="t-out">→ Connecting data warehouse...</span> <span className="t-highlight">✓</span></div>
            <div className="t-line"><span className="t-out">→ Loading 24mo sell-through data...</span> <span className="t-highlight">✓ 847,320 rows</span></div>
            <div className="t-line"><span className="t-out">→ STL seasonality decomposition...</span> <span className="t-highlight">✓ MAPE: 4.2%</span></div>
            <div className="t-line"><span className="t-out">→ Generating Power BI export...</span> <span className="t-highlight">✓ 1.3s</span></div>
            <div className="t-line"><span className="t-out">→ Sending to executive Slack channel...</span> <span className="t-highlight">✓ Delivered 06:00 AM</span></div>
            <div className="t-line"><span className="t-comment">// Previously: 3 analysts × 2 days. Now: automated. Every Monday. While sleeping.</span></div>
            <div className="t-line"><span className="t-prompt">$</span> <span className="t-cursor"></span></div>
          </div>
        </div>
      </div>

      <section id="experience" className="section">
        <div className="section-eyebrow">Career Timeline</div>
        <h2 className="section-title">Where I built<br /><em>things that still run.</em></h2>
        <div className="exp-grid reveal">
          <div className="exp-nav">
            {EXPERIENCES.map(e => (
              <div key={e.id}
                className={`exp-nav-item ${activeExp===e.id?'active':''}`}
                onClick={() => setActiveExp(e.id)}>
                <div className="exp-nav-date">{e.date}</div>
                <div className="exp-nav-role">{e.role}</div>
                <div className="exp-nav-co">{e.company}</div>
              </div>
            ))}
          </div>
          <div className="exp-detail">
            <div className="exp-detail-role">{exp.role}</div>
            <div className="exp-detail-meta">
              <span>{exp.company}</span><span>·</span>
              <span>{exp.location}</span><span>·</span>
              <span>{exp.revenue}</span>
            </div>
            <ul className="exp-bullets">
              {exp.highlights.map((h,i) => <li key={i}>{h}</li>)}
            </ul>
            <div className="exp-tags">
              {exp.tags.map(t => <span key={t} className="exp-tag">{t}</span>)}
            </div>
          </div>
        </div>
      </section>

      <section id="skills" className="section">
        <div className="section-eyebrow">Arsenal</div>
        <h2 className="section-title">Tools I use.<br /><span style={{color:'var(--text-dim)'}}>Not just list.</span></h2>
        <div className="skills-grid reveal">
          {SKILLS.map((s,i) => (
            <div key={i} className="skill-card">
              <div className="skill-icon">{s.icon}</div>
              <div className="skill-name">{s.name}</div>
              <div className="skill-desc">{s.desc}</div>
              <div className="skill-bar">
                <div className="skill-bar-fill" style={{width:`${s.pct}%`}}></div>
              </div>
              <div className="skill-pct">{s.pct}%</div>
            </div>
          ))}
        </div>
      </section>

      {/* STACK */}
      <section id="stack" className="section">
        <div className="section-eyebrow">Tech Stack</div>
        <h2 className="section-title">Tools I ship with.<br /><em>Not just buzzwords.</em></h2>
        <div className="stack-grid reveal">
          {STACK_TOOLS.map((t,i) => (
            <div key={i} className="stack-card">
              <div className="stack-level">{t.level}</div>
              {t.logo
                ? <img src={t.logo} alt={t.name} className="stack-logo" onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='flex'}} />
                : null
              }
              <div className="stack-logo-placeholder" style={{background:`${t.color}18`,display:t.logo?'none':'flex'}}>
                {t.emoji}
              </div>
              <div className="stack-name">{t.name}</div>
              <div className="stack-cat">{t.cat}</div>
            </div>
          ))}
        </div>
      </section>

      {/* TESTIMONIALS */}
      <section id="testimonials" className="section" style={{paddingTop:0}}>
        <div className="section-eyebrow">Social Proof</div>
        <h2 className="section-title">Don't take<br /><em>my word for it.</em></h2>
        <div className="testi-grid reveal">
          {TESTIMONIALS.map((t,i) => (
            <div key={i} className="testi-card">
              <div className="testi-stars">{'★'.repeat(t.stars)}</div>
              <div className="testi-quote">{t.quote}</div>
              <div className="testi-author">
                <div className="testi-avatar">{t.initials}</div>
                <div>
                  <div className="testi-name">{t.name}</div>
                  <div className="testi-role">{t.role}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </section>

      <div className="world-strip">
        <div className="world-inner">
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:".58rem",color:"var(--text-dim)",letterSpacing:"3px",textTransform:"uppercase"}}>Lived & worked in</span>
          {[
            {iso:'fr',n:'France'},{iso:'ca',n:'Canada'},{iso:'us',n:'USA'},
            {iso:'de',n:'Germany'},{iso:'it',n:'Italy'},{iso:'es',n:'Spain'},{iso:'tr',n:'Turkey'}
          ].map((c,i) => (
            <div key={i} className="country">
              <img
                src={'https://flagcdn.com/48x36/' + c.iso + '.png'}
                width="48" height="36"
                alt={c.n}
                style={{borderRadius:'4px',border:'2px solid rgba(0,0,0,.15)',boxShadow:'0 3px 10px rgba(0,0,0,.25)',display:'block',margin:'0 auto'}}
              />
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:'.58rem',color:'var(--text-sec)',letterSpacing:'2px',marginTop:'6px',textAlign:'center'}}>{c.n}</div>
            </div>
          ))}
        </div>
      </div>

      <section id="contact" className="section">
        <div className="section-eyebrow">Contact</div>
        <h2 className="section-title">Let's build<br /><em>something real.</em></h2>
        <div className="contact-grid reveal">
          <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
            {[
              {icon:'📧',label:'Email',value:'antoinedemaintenant@alumni.ie.edu'},
              {icon:'🔗',label:'LinkedIn',value:'linkedin.com/in/antoine2maintenant'},
              {icon:'📍',label:'Location',value:'France · Canada (Montréal)'},
              {icon:'📱',label:'Phone',value:'+1 (263) 385-6506'},
            ].map((c,i) => (
              <div key={i} className="contact-card">
                <div className="contact-icon">{c.icon}</div>
                <div className="contact-label">{c.label}</div>
                <div className="contact-value">{c.value}</div>
              </div>
            ))}
          </div>
          <div style={{background:'var(--bg2)',border:'1px solid rgba(200,85,255,.18)',padding:'40px'}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'1.8rem',letterSpacing:'2px',marginBottom:'16px',color:'var(--text)'}}>
              I'm selective about what I build next.
            </div>
            <p style={{fontSize:'.92rem',color:'var(--text-sec)',lineHeight:'1.85',marginBottom:'32px'}}>
              If you have a data problem that's costing you real money and time — manual reports, broken pipelines, zero visibility into your operations — I'm interested.
              <br/><br/>
              If you want me to "just make the charts prettier," I'll politely refer you to Canva.
            </p>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:'.62rem',color:'var(--accent1)',letterSpacing:'2px',textTransform:'uppercase',display:'flex',alignItems:'center',gap:'8px'}}>
              <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--accent1)',animation:'pulse 2s infinite',display:'inline-block'}}></span>
              Open to new missions · 2026
            </div>
          </div>
        </div>
      </section>

      <footer className="footer">
        © 2026 Antoine de Maintenant
        <span className="credit">// Try the Konami code. You won't regret it.</span>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
