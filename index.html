<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antoine de Maintenant — ⚡ Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1E1535;--bg2:#2A1D4A;--bg3:#362460;--bg-card:rgba(42,29,74,0.95);
  --text:#FFFFFF;--text-sec:#D0C4F0;--text-dim:#9B8DCC;--text-mute:#6B5E99;
  --accent1:#C44EFF;--accent2:#FF3D85;--accent3:#00F5B0;
  --border:rgba(196,78,255,.35);--border-dim:rgba(196,78,255,.18);
  --nav-bg:rgba(20,13,42,.96);--roi-out-bg:rgba(5,2,20,.7);
  --terminal-bg:#020008;--log-bg:#010006;
  --glow1:rgba(196,78,255,.3);--glow2:rgba(255,61,133,.3);--glow3:rgba(0,245,176,.3);
}
[data-theme=hacker]{--bg:#020C08;--bg2:#041A0E;--bg3:#031208;--bg-card:rgba(4,26,14,.95);--accent1:#00FF88;--accent2:#00FFFF;--accent3:#FFFF00;--text:#CCFFE8;--text-sec:#88DDBB;--text-dim:#55AA77;--text-mute:#337755;--border:rgba(0,255,136,.3);--border-dim:rgba(0,255,136,.12);--nav-bg:rgba(1,8,4,.96);--roi-out-bg:rgba(0,10,5,.8);--terminal-bg:#010A04;--log-bg:#000802;--glow1:rgba(0,255,136,.25);--glow2:rgba(0,255,255,.2);--glow3:rgba(255,255,0,.2);}
[data-theme=light]{--bg:#F4F0FC;--bg2:#E8E0F5;--bg3:#DDD4F0;--bg-card:rgba(255,255,255,.97);--accent1:#7B0FE0;--accent2:#D4005A;--accent3:#007A55;--text:#1A0A2E;--text-sec:#3D2B60;--text-dim:#6B5E99;--text-mute:#9B8DCC;--border:rgba(123,15,224,.3);--border-dim:rgba(123,15,224,.15);--nav-bg:rgba(244,240,252,.97);--roi-out-bg:rgba(232,224,245,.9);--terminal-bg:#1A0A2E;--log-bg:#0F0620;--glow1:rgba(123,15,224,.15);--glow2:rgba(212,0,90,.12);--glow3:rgba(0,122,85,.12);}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow-x:hidden;cursor:none;transition:background .35s,color .35s}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--accent1),var(--accent2))}

#cur-o{position:fixed;width:32px;height:32px;border:1.5px solid var(--accent1);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .15s,border-color .2s,width .2s,height .2s;opacity:.7}
#cur-i{position:fixed;width:6px;height:6px;background:var(--accent2);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
body.hovering #cur-o{transform:translate(-50%,-50%) scale(1.8);border-color:var(--accent2)}

body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1;opacity:.2}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(139,0,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(139,0,255,.07) 1px,transparent 1px);background-size:60px 60px}
[data-theme=light] .grid-bg{background-image:linear-gradient(rgba(123,15,224,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(123,15,224,.06) 1px,transparent 1px)}
.scanline{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(139,0,255,.12),transparent);z-index:2;pointer-events:none;animation:scan 8s linear infinite}
@keyframes scan{from{top:-2px}to{top:100vh}}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.scroll-bar{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,var(--accent1),var(--accent2),var(--accent3));z-index:9998;box-shadow:0 0 8px var(--glow1)}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:500;background:var(--nav-bg);backdrop-filter:blur(18px);border-bottom:1px solid var(--border-dim);height:60px;display:flex;align-items:center;padding:0 32px;gap:32px;}
.nav-logo{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--accent1);letter-spacing:3px;white-space:nowrap;flex-shrink:0}
.nav-links{display:flex;gap:4px;flex:1;justify-content:center;flex-wrap:nowrap;overflow:hidden}
.nav-link{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:color .2s,background .2s;border:none;background:none;padding:6px 8px;border-radius:4px;white-space:nowrap}
.nav-link:hover{color:var(--accent2);background:rgba(255,61,133,.08)}
.nav-themes{display:flex;gap:2px;flex-shrink:0;background:rgba(255,255,255,.05);border:1px solid var(--border-dim);border-radius:6px;overflow:hidden}
.theme-btn{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:1px;text-transform:uppercase;padding:7px 11px;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.theme-btn.active{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff}
.theme-btn:not(.active){background:transparent;color:var(--text-dim)}
.theme-btn:not(.active):hover{background:rgba(255,255,255,.07);color:var(--text)}

/* TICKER */
.ticker{position:relative;z-index:5;background:rgba(196,78,255,.1);border-top:1px solid rgba(196,78,255,.2);border-bottom:1px solid rgba(196,78,255,.2);padding:13px 0;overflow:hidden}
[data-theme=light] .ticker{background:rgba(123,15,224,.08)}
.ticker-inner{display:flex;gap:48px;white-space:nowrap;animation:tickerScroll 28s linear infinite}
@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--accent1);letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:12px}
.ticker-item::before{content:'◆';color:var(--accent2);font-size:.45rem}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:100px 60px 80px;position:relative;z-index:5;max-width:1400px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:10px;font-family:'Space Mono',monospace;font-size:.58rem;color:var(--accent1);letter-spacing:4px;text-transform:uppercase;border:1px solid var(--border);padding:8px 20px;border-radius:2px;margin-bottom:40px;width:fit-content;animation:borderGlow 4s infinite}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite}
.hero-h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,11vw,10.5rem);line-height:.88;letter-spacing:2px;margin-bottom:8px;will-change:transform}
.hero-h1 .accent{color:var(--accent2);animation:rgbShift 6s infinite}
.hero-h1 .outline{-webkit-text-stroke:1.5px var(--border);color:transparent}
.hero-sub{font-size:1.05rem;color:var(--text-sec);max-width:540px;line-height:1.85;margin:28px 0 40px}
.hero-sub span{color:var(--accent1)}
.typewriter-row{font-family:'Space Mono',monospace;font-size:.85rem;color:var(--accent1);margin-bottom:40px;display:flex;align-items:center;gap:8px}
.typewriter-row .prompt{color:var(--text-mute)}
.t-cursor{display:inline-block;width:8px;height:14px;background:var(--accent1);animation:blink 1s infinite;vertical-align:middle;margin-left:2px}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;padding:14px 32px;border:none;cursor:pointer;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);transition:all .2s;position:relative;overflow:hidden;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 40px var(--glow1)}
.btn-secondary{background:rgba(196,78,255,.1);color:var(--text-sec);font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;padding:14px 32px;border:1px solid var(--border);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.btn-secondary:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(255,61,133,.08)}
[data-theme=light] .btn-secondary{background:rgba(123,15,224,.08)}

/* METRICS */
.metrics{position:relative;z-index:5;display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border-dim);background:var(--bg2)}
.metric{padding:36px 28px;text-align:center;border-right:1px solid var(--border-dim)}
.metric:last-child{border-right:none}
.metric-num{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;line-height:1;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block}
.metric-lbl{font-family:'Space Mono',monospace;font-size:.55rem;color:var(--text-sec);letter-spacing:2px;text-transform:uppercase;margin-top:6px;display:block}

/* SECTIONS */
.section{padding:90px 60px;position:relative;z-index:5;max-width:1400px;margin:0 auto}
.section-full{padding:90px 0;position:relative;z-index:5;background:var(--bg2)}
.section-full-inner{max-width:1400px;margin:0 auto;padding:0 60px}
.section-eyebrow{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--accent2);letter-spacing:4px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.section-eyebrow::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--accent2),transparent);opacity:.4}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,5vw,4.2rem);line-height:1;letter-spacing:2px;margin-bottom:56px;color:var(--text)}
.section-title em{color:var(--accent1);font-style:normal}

/* DASHBOARD */
.dashboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.kpi-box{padding:20px;border:1px solid var(--border-dim);border-radius:10px;background:var(--bg-card);backdrop-filter:blur(10px);transition:all .25s}
.kpi-box:hover{border-color:var(--accent1);transform:translateY(-3px);box-shadow:0 8px 30px var(--glow1)}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--accent1);line-height:1}
.kpi-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.kpi-delta{font-size:11px;color:var(--accent3);margin-top:3px;font-family:'Space Mono',monospace}
.chart-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
.chart-box{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:10px;padding:22px}
.chart-title{font-size:11px;font-weight:600;color:var(--text-dim);margin-bottom:14px;letter-spacing:2px;text-transform:uppercase;font-family:'Space Mono',monospace}
.chart-wrap{position:relative;height:200px}

/* PIPELINE */
.pipeline-wrap{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:12px;padding:36px}
.pipeline-stages{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:28px;gap:0}
.p-node{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 16px;border-radius:10px;border:2px solid var(--border-dim);background:var(--bg);transition:all .4s;min-width:100px;text-align:center;cursor:grab;user-select:none}
.p-node:active{cursor:grabbing}
.p-node.running{border-color:var(--accent1);box-shadow:0 0 20px var(--glow1);background:rgba(196,78,255,.08)}
.p-node.done{border-color:var(--accent3);box-shadow:0 0 15px var(--glow3)}
.p-node.dragging{opacity:.4;transform:scale(.95)}
.p-node.drag-over{border-color:var(--accent2);box-shadow:0 0 20px var(--glow2);transform:scale(1.05)}
.p-node.wrong-order{border-color:#ff4444;box-shadow:0 0 20px rgba(255,68,68,.4);animation:shake .4s ease}
.p-node-icon{font-size:24px}
.p-node-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim)}
.p-node-detail{font-size:9px;color:var(--text-mute);font-family:'Space Mono',monospace}
.p-connector{width:36px;height:3px;background:var(--border-dim);flex-shrink:0;position:relative}
.p-connector-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent1),var(--accent3));transition:width .5s}
.pipeline-log{background:var(--log-bg);border:1px solid var(--border-dim);border-radius:8px;padding:14px;font-family:'Space Mono',monospace;font-size:11.5px;height:130px;overflow-y:auto;margin-bottom:18px;color:var(--accent3)}
.log-line{margin-bottom:3px;line-height:1.6}
.run-btn{display:block;margin:0 auto;padding:13px 44px;background:linear-gradient(135deg,var(--accent1),var(--accent2));border:none;border-radius:8px;color:#fff;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .3s}
.run-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px var(--glow1)}
.run-btn:disabled{opacity:.5;cursor:not-allowed}
.drag-hint{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--text-mute);letter-spacing:2px;text-align:center;margin-bottom:14px}
.wrong-order-msg{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);border-radius:8px;padding:12px 18px;font-family:'Space Mono',monospace;font-size:.62rem;color:#ff6666;text-align:center;margin-bottom:14px;animation:fadeIn .3s ease}

/* EXPERIENCE */
.exp-filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border-dim);background:transparent;color:var(--text-dim);font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;transition:all .2s;letter-spacing:1px}
.filter-btn.active,.filter-btn:hover{background:var(--accent1);color:#fff;border-color:var(--accent1)}
.exp-layout{display:grid;grid-template-columns:260px 1fr;gap:40px}
.exp-nav{display:flex;flex-direction:column}
.exp-nav-item{padding:18px 20px;cursor:pointer;transition:all .2s;border-left:2px solid transparent;border-bottom:1px solid var(--border-dim)}
.exp-nav-item:last-child{border-bottom:none}
.exp-nav-item:hover{background:rgba(196,78,255,.06)}
.exp-nav-item.active{background:rgba(196,78,255,.1);border-left-color:var(--accent2)}
.exp-nav-date{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.exp-nav-role{font-size:.88rem;font-weight:700;margin-bottom:3px;color:var(--text)}
.exp-nav-co{font-size:.75rem;color:var(--text-dim)}
.exp-detail{background:var(--bg-card);border:1px solid var(--border-dim);padding:36px;position:sticky;top:72px;border-radius:8px}
.exp-detail-role{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;margin-bottom:5px;color:var(--text)}
.exp-detail-meta{font-family:'Space Mono',monospace;font-size:.56rem;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;display:flex;gap:12px;flex-wrap:wrap}
.exp-bullets{list-style:none;display:flex;flex-direction:column;gap:14px}
.exp-bullets li{display:flex;gap:10px;font-size:.9rem;color:var(--text-sec);line-height:1.7}
.exp-bullets li::before{content:'→';color:var(--accent1);flex-shrink:0;margin-top:2px}
.exp-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:24px}
.exp-tag{background:rgba(196,78,255,.1);border:1px solid var(--border-dim);color:var(--accent1);font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:2px;text-transform:uppercase;padding:4px 9px;border-radius:2px}

/* SKILLS & RADAR */
.skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.skill-card{background:var(--bg-card);border:1px solid var(--border-dim);padding:22px;transition:all .25s;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%)}
.skill-card:hover{border-color:var(--accent1);transform:translateY(-4px);box-shadow:0 12px 36px var(--glow1)}
.skill-icon{font-size:1.6rem;margin-bottom:12px}
.skill-name{font-size:.95rem;font-weight:700;margin-bottom:5px;color:var(--text)}
.skill-desc{font-size:.76rem;color:var(--text-sec);line-height:1.55}
.skill-bar{height:2px;background:var(--border-dim);margin-top:14px;overflow:hidden}
.skill-fill{height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2))}
.skill-pct{font-family:'Space Mono',monospace;font-size:.56rem;color:var(--accent1);margin-top:6px;text-align:right}
.radar-section{margin-top:48px}
.radar-title{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--accent2);letter-spacing:4px;text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.radar-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--accent2),transparent);opacity:.4}
.radar-wrap{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:12px;padding:32px;display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:center}
.radar-chart-wrap{position:relative;height:320px;max-width:380px;margin:0 auto;width:100%}
.radar-legend{display:flex;flex-direction:column;gap:16px}
.radar-legend-item{display:flex;align-items:center;gap:12px}
.radar-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.radar-legend-label{font-size:.86rem;font-weight:600;color:var(--text)}
.radar-legend-sub{font-size:.72rem;color:var(--text-dim);margin-top:2px}
.radar-legend-pct{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--accent1);margin-left:auto}

/* STACK */
.stack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.stack-card{background:var(--bg-card);border:1px solid var(--border-dim);padding:20px 14px;text-align:center;transition:all .25s;border-radius:6px;position:relative;overflow:hidden}
.stack-card:hover{border-color:var(--accent1);transform:translateY(-5px);box-shadow:0 14px 36px var(--glow1)}
.stack-emoji{font-size:1.5rem;margin-bottom:10px;display:block;transition:transform .25s}
.stack-card:hover .stack-emoji{transform:scale(1.15)}
.stack-name{font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:3px}
.stack-cat{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase}
.stack-level{position:absolute;top:8px;right:8px;font-family:'Space Mono',monospace;font-size:.44rem;color:var(--accent3);background:rgba(0,245,176,.1);border:1px solid rgba(0,245,176,.2);padding:2px 5px;border-radius:2px}

/* ROI */
.roi-wrap{background:var(--bg-card);border:1px solid var(--border-dim);padding:40px;border-radius:8px;position:relative;overflow:hidden}
.roi-wrap::before{content:'// ROI CALCULATOR';position:absolute;top:16px;right:20px;font-family:'Space Mono',monospace;font-size:.46rem;color:var(--text-mute);letter-spacing:3px}
.roi-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start}
.roi-inputs{display:flex;flex-direction:column;gap:24px}
.roi-input-group label{display:block;font-family:'Space Mono',monospace;font-size:.56rem;color:var(--text-sec);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.roi-val-badge{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--accent1);margin-left:10px}
input[type=range]{width:100%;appearance:none;height:3px;background:var(--border-dim);outline:none;border-radius:2px;margin-top:4px}
input[type=range]::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:50%;background:linear-gradient(135deg,var(--accent1),var(--accent2));cursor:pointer}
.roi-out{background:var(--roi-out-bg);border:1px solid var(--border-dim);padding:28px;display:flex;flex-direction:column;gap:20px;border-radius:6px}
.roi-metric{border-bottom:1px solid var(--border-dim);padding-bottom:16px}
.roi-metric:last-child{border:none;padding:0}

.roi-metric-val.green{color:var(--accent3)}

/* TERMINAL CHATBOT */
.terminal{background:var(--terminal-bg);border:1px solid var(--border-dim);border-radius:8px;animation:borderGlow 6s infinite;overflow:hidden}

.t-line{font-family:'Space Mono',monospace;font-size:.7rem;line-height:1.75;color:var(--text-sec)}
.t-prompt{color:var(--accent1)}.t-cmd{color:var(--accent3)}.t-hl{color:var(--accent2);font-weight:700}.t-dim{color:var(--text-mute)}

/* TERMINAL CHATBOT SECTION */
.terminal-chat{background:var(--terminal-bg);border:1px solid var(--border-dim);border-radius:8px;overflow:hidden;max-width:700px;margin:0 auto}
.terminal-chat-title{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--accent2);letter-spacing:4px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:12px;margin-bottom:24px}

.chat-output{padding:20px 24px;font-family:'Space Mono',monospace;font-size:.72rem;line-height:1.8;height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.chat-line-user{color:var(--accent1)}
.chat-line-sys{color:var(--accent3)}
.chat-line-err{color:#ff6666}
.chat-line-dim{color:var(--text-mute)}
.chat-line-info{color:var(--text-sec)}
.chat-input-row{display:flex;align-items:center;padding:12px 20px;border-top:1px solid var(--border-dim);gap:8px}
.chat-prompt-label{color:var(--accent1);font-family:'Space Mono',monospace;font-size:.75rem;white-space:nowrap}
.chat-input{background:transparent;border:none;outline:none;font-family:'Space Mono',monospace;font-size:.75rem;color:var(--text);flex:1;caret-color:var(--accent1)}

/* TESTIMONIALS */
.testi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}

.testi-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:#fff;flex-shrink:0}

/* WORLD STRIP */

/* CONTACT */

/* VISITOR / BADGE / MISC */
.visitor-badge{position:fixed;bottom:24px;right:24px;z-index:400;background:var(--bg-card);border:1px solid var(--border-dim);border-radius:24px;padding:10px 18px;display:flex;align-items:center;gap:8px;backdrop-filter:blur(12px);font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim);box-shadow:0 4px 20px rgba(0,0,0,.3)}

.projects-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.project-card{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:10px;padding:28px;transition:all .3s;position:relative;overflow:hidden}
.project-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--glow1),transparent);opacity:0;transition:opacity .3s}

.project-stat{background:rgba(196,78,255,.08);border:1px solid var(--border-dim);padding:5px 12px;border-radius:4px;font-family:'Space Mono',monospace;font-size:.52rem;color:var(--accent1);letter-spacing:1px}

.project-tag{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--text-dim);border:1px solid var(--border-dim);padding:3px 8px;border-radius:2px;letter-spacing:1px}
.scroll-top{position:fixed;bottom:80px;right:24px;z-index:400;width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent1),var(--accent2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;box-shadow:0 4px 20px var(--glow1);opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.scroll-top.visible{opacity:1;transform:translateY(0);pointer-events:all}
.scroll-top:hover{transform:translateY(-3px) !important;box-shadow:0 8px 28px var(--glow1)}
.xp-badge{display:inline-flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:.72rem;color:var(--accent3);background:rgba(0,245,176,.08);border:1px solid rgba(0,245,176,.25);padding:6px 14px;border-radius:20px;margin-top:12px}
.copy-toast{position:fixed;bottom:140px;right:24px;z-index:800;background:var(--accent3);color:#1A0A2E;font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:2px;padding:10px 18px;border-radius:20px;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none;font-weight:700}
.copy-toast.show{opacity:1;transform:translateY(0)}
.country-modal-overlay{position:fixed;inset:0;background:rgba(10,5,21,.88);z-index:900;display:flex;align-items:center;justify-content:center;animation:fadeIn .25s ease;padding:20px}
.country-modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:0;max-width:520px;width:100%;animation:popIn .35s cubic-bezier(.16,1,.3,1);overflow:hidden;box-shadow:0 0 60px var(--glow1)}
.country-modal-header{padding:28px 32px 20px;border-bottom:1px solid var(--border-dim);display:flex;align-items:center;gap:16px}
.country-modal-flag{width:56px;height:42px;border-radius:6px;border:2px solid var(--border-dim);object-fit:cover}
.country-modal-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--text)}
.country-modal-sub{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.country-modal-body{padding:24px 32px 28px;display:flex;flex-direction:column;gap:12px}
.country-modal-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
.country-modal-tag{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--accent1);background:rgba(196,78,255,.08);border:1px solid var(--border-dim);padding:3px 10px;border-radius:20px;letter-spacing:1px}
.country-modal-text{font-size:.88rem;color:var(--text-sec);line-height:1.85}
.country-modal-close{display:block;margin:4px auto 0;background:rgba(196,78,255,.1);border:1px solid var(--border-dim);color:var(--text-dim);font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:2px;text-transform:uppercase;padding:10px 24px;cursor:pointer;border-radius:4px;transition:all .2s}

.country-flag-btn{cursor:pointer;transition:transform .2s;display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;padding:0}
.country-flag-btn:hover{transform:scale(1.12)}
.country-flag-btn img{border-radius:4px;border:2px solid var(--border-dim);box-shadow:0 2px 8px rgba(0,0,0,.25);transition:border-color .2s;display:block}
.country-flag-btn:hover img{border-color:var(--accent2)}
.country-flag-label{font-family:'Space Mono',monospace;font-size:.5rem;color:var(--text-sec);letter-spacing:2px}
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.blog-card{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:10px;padding:24px;transition:all .3s;cursor:pointer;position:relative;overflow:hidden}
.blog-card:hover{border-color:var(--accent1);transform:translateY(-4px);box-shadow:0 12px 36px var(--glow1)}
.blog-tag{font-family:'Space Mono',monospace;font-size:.44rem;color:var(--accent2);background:rgba(255,61,133,.08);border:1px solid rgba(255,61,133,.2);padding:3px 10px;border-radius:20px;letter-spacing:2px;text-transform:uppercase;display:inline-block;margin-bottom:12px}
.blog-title{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:1.5px;margin-bottom:8px;color:var(--text);line-height:1.2}
.blog-excerpt{font-size:.78rem;color:var(--text-sec);line-height:1.7;margin-bottom:14px}
.blog-meta{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--text-mute);letter-spacing:1px;display:flex;gap:12px}
.blog-read-more{font-family:'Space Mono',monospace;font-size:.5rem;color:var(--accent1);letter-spacing:2px;text-transform:uppercase;margin-top:10px;display:flex;align-items:center;gap:5px}
.blog-modal-overlay{position:fixed;inset:0;background:rgba(10,5,21,.94);z-index:900;display:flex;align-items:center;justify-content:center;animation:fadeIn .25s ease;padding:24px}
.blog-modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;max-width:680px;width:100%;max-height:85vh;overflow-y:auto;animation:popIn .35s cubic-bezier(.16,1,.3,1);box-shadow:0 0 60px var(--glow1)}
.blog-modal-inner{padding:40px}
.blog-modal-tag{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--accent2);background:rgba(255,61,133,.08);border:1px solid rgba(255,61,133,.2);padding:4px 12px;border-radius:20px;letter-spacing:2px;text-transform:uppercase;display:inline-block;margin-bottom:16px}
.blog-modal-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:2px;margin-bottom:8px;color:var(--text);line-height:1.1}
.blog-modal-meta{font-family:'Space Mono',monospace;font-size:.5rem;color:var(--text-mute);letter-spacing:1px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border-dim)}
.blog-modal-body{font-size:.9rem;color:var(--text-sec);line-height:1.9}
.blog-modal-body p{margin-bottom:16px}
.blog-modal-body strong{color:var(--accent1)}
.blog-modal-close{display:block;margin:28px auto 0;background:rgba(196,78,255,.1);border:1px solid var(--border-dim);color:var(--text-dim);font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:2px;text-transform:uppercase;padding:10px 24px;cursor:pointer;border-radius:4px;transition:all .2s}
.blog-modal-close:hover{border-color:var(--accent2);color:var(--accent2)}
.footer{position:relative;z-index:5;text-align:center;padding:40px;border-top:1px solid var(--border-dim);font-family:'Space Mono',monospace;font-size:.56rem;color:var(--text-mute);letter-spacing:2px}
.footer span{color:var(--text-dim);display:block;margin-top:6px}
.konami-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:.46rem;color:var(--text-mute);letter-spacing:3px;z-index:50;pointer-events:none;opacity:.4}

/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes rgbShift{0%{text-shadow:2px 0 var(--accent2),-2px 0 var(--accent1)}50%{text-shadow:-2px 0 var(--accent2),2px 0 #00F5FF}100%{text-shadow:2px 0 var(--accent2),-2px 0 var(--accent1)}}
@keyframes borderGlow{0%,100%{box-shadow:0 0 12px var(--glow1)}50%{box-shadow:0 0 24px var(--glow2)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes glitch1{0%,100%{clip-path:inset(0 0 98% 0);transform:translate(-3px,0)}20%{clip-path:inset(30% 0 50% 0);transform:translate(3px,0)}60%{clip-path:inset(10% 0 80% 0);transform:translate(3px,0)}}
@keyframes glitch2{0%,100%{clip-path:inset(98% 0 0 0);transform:translate(3px,0)}20%{clip-path:inset(10% 0 70% 0);transform:translate(-3px,0)}60%{clip-path:inset(40% 0 40% 0);transform:translate(-3px,0)}}
.glitch-wrap{position:relative;display:inline-block}
.glitch-wrap::before,.glitch-wrap::after{content:attr(data-text);position:absolute;top:0;left:0;right:0;font:inherit}
.glitch-wrap::before{color:var(--accent2);animation:glitch1 4s infinite linear;opacity:.75}
.glitch-wrap::after{color:var(--accent1);animation:glitch2 4s .5s infinite linear;opacity:.75}
.reveal{opacity:0;transform:translateY(22px);transition:all .7s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:translateY(0)}

@media(max-width:1100px){.nav-links{display:none}}
@media(max-width:900px){.hero{padding:90px 24px 60px}.section{padding:70px 24px}.section-full-inner{padding:0 24px}.exp-layout,.roi-grid,.contact-layout{grid-template-columns:1fr}.skills-grid,.testi-grid{grid-template-columns:1fr 1fr}.metrics{grid-template-columns:1fr 1fr}.metric{border-bottom:1px solid var(--border-dim)}.chart-grid{grid-template-columns:1fr}.dashboard-grid{grid-template-columns:repeat(2,1fr)}.p-connector{width:18px}.p-node{min-width:75px;padding:10px}.nav{padding:0 20px;gap:16px}.konami-hint{display:none}.radar-wrap{grid-template-columns:1fr}.radar-chart-wrap{height:260px}}
</style>
</head>
<body data-theme="light">
<canvas id="particles"></canvas>
<div class="grid-bg"></div>
<div class="scanline"></div>
<div id="cur-o"></div>
<div id="cur-i"></div>
<div class="scroll-bar" id="sbar"></div>
<div class="konami-hint">↑ ↑ ↓ ↓ ← → ← → B A</div>
<div id="root"></div>

<script>
// CURSOR
const co=document.getElementById('cur-o'),ci=document.getElementById('cur-i');
let mx=0,my=0,ox=0,oy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;ci.style.left=mx+'px';ci.style.top=my+'px'});
(function anim(){ox+=(mx-ox)*.12;oy+=(my-oy)*.12;co.style.left=ox+'px';co.style.top=oy+'px';requestAnimationFrame(anim)})();
document.addEventListener('mouseover',e=>{if(e.target.closest('a,button,[role=button]'))document.body.classList.add('hovering');else document.body.classList.remove('hovering')});

// PARTICLES
(function(){
  const c=document.getElementById('particles'),ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight}resize();window.addEventListener('resize',resize);
  const pts=Array.from({length:70},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.4+.4}));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    const th=document.body.getAttribute('data-theme');
    const col=th==='hacker'?'0,255,136':th==='light'?'123,15,224':'196,78,255';
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${col},.5)`;ctx.fill()});
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<110){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(${col},${.15*(1-d/110)})`;ctx.lineWidth=.5;ctx.stroke()}}));
    requestAnimationFrame(draw);
  }draw();
})();

// SCROLL PROGRESS
window.addEventListener('scroll',()=>{const d=document.documentElement;document.getElementById('sbar').style.width=(d.scrollTop/(d.scrollHeight-d.clientHeight)*100)+'%'});

// PARALLAX HERO — mousemove on hero h1
document.addEventListener('mousemove',e=>{
  const h1=document.querySelector('.hero-h1');
  if(!h1)return;
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  const dx=(e.clientX-cx)/cx,dy=(e.clientY-cy)/cy;
  h1.style.transform=`translate(${dx*14}px,${dy*8}px)`;

// ── ANIMATED METRIC COUNTER ──────────────────────────────────────────────────
function AnimatedMetric({n,s,l}){
  const [val,setVal]=useState(0);
  const [started,setStarted]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    const obs=new IntersectionObserver(entries=>{
      if(entries[0].isIntersecting&&!started){setStarted(true)}
    },{threshold:.5});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[started]);
  useEffect(()=>{
    if(!started)return;
    const target=parseInt(n,10);
    const duration=1800;
    const start=performance.now();
    function tick(now){
      const p=Math.min((now-start)/duration,1);
      const eased=1-Math.pow(1-p,3);
      setVal(Math.round(eased*target));
      if(p<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  },[started,n]);
  return(
    <div className="metric" ref={ref}>
      <span className="metric-num">{val}{s}</span>
      <span className="metric-lbl">{l}</span>
    </div>
  );
}

// ── DRAG & DROP PIPELINE ─────────────────────────────────────────────────────
function Pipeline({lang}){
  const t=T[lang];
  const defaultStages=PIPELINE_STAGES_DEF[lang];
  const [stages,setStages]=useState(()=>PIPELINE_STAGES_DEF[lang].map((s,i)=>({...s,origIdx:i})));
  const [stage,setStage]=useState(-1);
  const [fills,setFills]=useState([0,0,0,0,0]);
  const [logs,setLogs]=useState(null);
  const [running,setRunning]=useState(false);
  const [dragIdx,setDragIdx]=useState(null);
  const [overIdx,setOverIdx]=useState(null);
  const [wrongMsg,setWrongMsg]=useState('');
  const [wrongIdx,setWrongIdx]=useState(-1);
  const logRef=useRef();

  useEffect(()=>{
    setLogs([{t:'READY',m:t.pipeReady}]);
    setStages(PIPELINE_STAGES_DEF[lang].map((s,i)=>({...s,origIdx:i})));
    setStage(-1);setFills([0,0,0,0,0]);setWrongMsg('');
  },[lang]);

  function isCorrectOrder(){return stages.map(s=>s.id).join(',')===CORRECT_ORDER.join(',');}

  async function run(){
    if(running)return;
    if(!isCorrectOrder()){
      const idx=stages.findIndex((s,i)=>s.id!==CORRECT_ORDER[i]);
      setWrongIdx(idx);
      const msgs=t.pipeWrongMsgs;
      setWrongMsg(msgs[Math.floor(Math.random()*msgs.length)]);
      setTimeout(()=>setWrongIdx(-1),1200);
      return;
    }
    setWrongMsg('');
    setRunning(true);setStage(-1);setFills([0,0,0,0,0]);setLogs([]);
    const MSGS=lang==='fr'
      ?[['INIT',"Connexion à l'API Retail Partner..."],['FETCH','Téléchargement de 847 lignes de données POS...'],['CLEAN','Suppression des nulls, normalisation de 32 SKUs...'],['MODEL','Prévision Prophet (30j) | MAPE : 4,2%'],['EMBED','Rafraîchissement Power BI · 12 rapports mis à jour'],['DONE','✓ Livré à 12 parties prenantes | 00:05:23']]
      :[['INIT','Connecting to Retail Partner API...'],['FETCH','Downloading 847 rows of POS data...'],['CLEAN','Removing nulls, normalizing 32 SKUs...'],['MODEL','Running Prophet forecast (30d) | MAPE: 4.2%'],['EMBED','Refreshing Power BI · 12 reports updated'],['DONE','✓ Delivered to 12 stakeholders | 00:05:23']];
    for(let i=0;i<6;i++){
      await new Promise(r=>setTimeout(r,900));
      setStage(i);setLogs(l=>[...l,{t:MSGS[i][0],m:MSGS[i][1]}]);
      setTimeout(()=>{if(logRef.current)logRef.current.scrollTop=9999},50);
      if(i<5){await new Promise(r=>setTimeout(r,350));setFills(f=>{const n=[...f];n[i]=100;return n})}
    }
    setRunning(false);
  }

  function onDragStart(i){setDragIdx(i);}
  function onDragOver(e,i){e.preventDefault();setOverIdx(i);}
  function onDrop(e,i){
    e.preventDefault();
    if(dragIdx===null||dragIdx===i)return;
    const newStages=[...stages];
    const moved=newStages.splice(dragIdx,1)[0];
    newStages.splice(i,0,moved);
    setStages(newStages);
    setDragIdx(null);setOverIdx(null);
    setWrongMsg('');setStage(-1);setFills([0,0,0,0,0]);
    setLogs([{t:'RESET',m:t.pipeReady}]);
  }
  function onDragEnd(){setDragIdx(null);setOverIdx(null);}

  if(!logs)return null;
  return(
    <div className="pipeline-wrap reveal">
      <div className="drag-hint">{t.pipeDragHint}</div>
      <div className="pipeline-stages">
        {stages.map((s,i)=>{
          const nodeClass=`p-node${stage===stages.findIndex(x=>x.id===CORRECT_ORDER[stage])&&stages[i].id===CORRECT_ORDER[stage]?' running':''
            }${stage>stages.findIndex(x=>x.id===CORRECT_ORDER[stage-1])&&stage>0?' done':''
            }${dragIdx===i?' dragging':''
            }${overIdx===i&&dragIdx!==i?' drag-over':''
            }${wrongIdx===i?' wrong-order':''}`;
          return(
            <React.Fragment key={s.id}>
              <div
                className={`p-node${running?' running':''
                }${dragIdx===i?' dragging':''
                }${overIdx===i&&dragIdx!==i?' drag-over':''
                }${wrongIdx===i?' wrong-order':''}`}
                draggable={!running}
                onDragStart={()=>onDragStart(i)}
                onDragOver={e=>onDragOver(e,i)}
                onDrop={e=>onDrop(e,i)}
                onDragEnd={onDragEnd}
                title="Drag to reorder"
              >
                <span className="p-node-icon">{s.icon}</span>
                <span className="p-node-label">{s.label}</span>
                <span className="p-node-detail">{s.detail}</span>
              </div>
              {i<stages.length-1&&<div className="p-connector"><div className="p-connector-fill" style={{width:fills[i]+'%'}}/></div>}
            </React.Fragment>
          );
        })}
      </div>
      {wrongMsg&&<div className="wrong-order-msg">{wrongMsg}</div>}
      <div className="pipeline-log" ref={logRef}>
        {logs.map((l,i)=><div key={i} className="log-line"><span style={{color:'var(--text-dim)'}}>[{l.t}]</span> {l.m}</div>)}
      </div>
      <button className="run-btn" onClick={run} disabled={running}>{running?t.pipeRunning:t.pipeRun}</button>
    </div>
  );
}

// ── ROI CALCULATOR ───────────────────────────────────────────────────────────

          <div className="roi-metric"><div className="roi-metric-lbl">{t.roiLbl3}</div><div className="roi-metric-val pink" style={{fontSize:"3.2rem"}}>{fmt(total)}</div></div>

          <div className="roi-savings-box">
            <div className="roi-metric-lbl">{t.roiLbl5}</div>
            <div className="roi-metric-val green" style={{fontSize:"2.8rem"}}>{fmt(savings)}</div>
            <div style={{fontSize:".65rem",color:"var(--accent3)",marginTop:"6px",fontFamily:"'Space Mono',monospace"}}>{t.roiRoi}{roi}%</div>
          </div>

// ── TERMINAL CHATBOT ─────────────────────────────────────────────────────────
function TerminalChatbot({lang}){
  const t=T[lang];
  const cmds=TERMINAL_CMDS[lang];
  const [history,setHistory]=useState([
    {t:'sys',m:lang==='fr'?"Bienvenue — antoine@portfolio:~$":"Welcome — antoine@portfolio:~$"},
    {t:'dim',m:lang==='fr'?"Tapez 'help' pour voir les commandes disponibles.":"Type 'help' to see available commands."},
  ]);
  const [input,setInput]=useState('');
  const [cmdHistory,setCmdHistory]=useState([]);
  const [histIdx,setHistIdx]=useState(-1);
  const [typing,setTyping]=useState(false);
  const outputRef=useRef();
  const inputRef=useRef();

  useEffect(()=>{
    setHistory([
      {t:'sys',m:lang==='fr'?"Bienvenue — antoine@portfolio:~$":"Welcome — antoine@portfolio:~$"},
      {t:'dim',m:lang==='fr'?"Tapez 'help' pour voir les commandes disponibles.":"Type 'help' to see available commands."},
    ]);
  },[lang]);

  useEffect(()=>{if(outputRef.current)outputRef.current.scrollTop=outputRef.current.scrollHeight;},[history,typing]);

  const colorClass={sys:'chat-line-sys',info:'chat-line-info',cmd:'chat-line-info',dim:'chat-line-dim',acc2:'chat-line-user',acc3:'chat-line-sys',err:'chat-line-err'};

  async function runCmd(raw){
    const cmd=raw.trim().toLowerCase();
    if(!cmd)return;
    setCmdHistory(h=>[raw,...h]);setHistIdx(-1);
    setHistory(h=>[...h,{t:'user',m:`> ${raw}`}]);
    if(cmd==='clear'){setTimeout(()=>setHistory([]),100);return;}
    const def=cmds[cmd]||cmds[raw.trim()];
    if(!def){
      setHistory(h=>[...h,{t:'err',m:lang==='fr'?`Commande introuvable : '${cmd}'. Tapez 'help'.`:`Command not found: '${cmd}'. Type 'help'.`}]);
      return;
    }
    setTyping(true);
    for(let i=0;i<def.output.length;i++){
      await new Promise(r=>setTimeout(r,i===0?200:80));
      setHistory(h=>[...h,def.output[i]]);
    }
    setTyping(false);
  }

  function handleKey(e){
    if(e.key==='Enter'){runCmd(input);setInput('');}
    else if(e.key==='ArrowUp'){
      const ni=Math.min(histIdx+1,cmdHistory.length-1);
      setHistIdx(ni);setInput(cmdHistory[ni]||'');
    }else if(e.key==='ArrowDown'){
      const ni=Math.max(histIdx-1,-1);
      setHistIdx(ni);setInput(ni===-1?'':cmdHistory[ni]||'');
    }else if(e.key==='Tab'){
      e.preventDefault();
      const keys=Object.keys(cmds);
      const match=keys.find(k=>k.startsWith(input));
      if(match)setInput(match);
    }
  }

  return(
    <div className="terminal-chat reveal">
      <div className="chat-bar">
        <div className="t-dot t-red"/><div className="t-dot t-yellow"/><div className="t-dot t-green"/>
        <span className="terminal-path">antoine@portfolio:~$</span>
      </div>
      <div className="chat-output" ref={outputRef} onClick={()=>inputRef.current?.focus()}>
        {history.map((l,i)=>(
          <div key={i} className={l.t==='user'?'chat-line-user':colorClass[l.t]||'chat-line-info'}>{l.m}</div>
        ))}
        {typing&&<div className="chat-line-dim">▊</div>}
      </div>
      <div className="chat-input-row">
        <span className="chat-prompt-label">$</span>
        <input
          ref={inputRef}
          className="chat-input"
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={handleKey}
          autoComplete="off"
          spellCheck="false"
          placeholder={t.terminalHint}
        />
      </div>
      <div className="chat-hint">TAB to autocomplete · ↑↓ history · try: help, whoami, ./hire_antoine.sh</div>
    </div>
  );
}

  useEffect(()=>{window.konamiCb=()=>setShowEgg(true);return()=>{window.konamiCb=null}},[]);
  useEffect(()=>{const h=e=>{if(e.key==='Escape'){setShowEgg(false);setActiveCountry(null)}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[]);
  useEffect(()=>{
    const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:.12});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  });

  const scrollTo=id=>document.getElementById(id)?.scrollIntoView({behavior:'smooth'});
  const allTags=[t.expFilterAll,...new Set(exps.flatMap(e=>e.tags))];

  return(<LangCtx.Provider value={lang}>
    {showEgg&&<EasterEgg onClose={()=>setShowEgg(false)} lang={lang}/>}
    {activeCountry&&<CountryModal country={activeCountry} onClose={()=>setActiveCountry(null)} lang={lang}/>}
    <ScrollToTop lang={lang}/>
    <VisitorBadge lang={lang}/>

    {/* NAV */}
    <nav className="nav">
      <div className="nav-logo">ADM.SYS // v4.1</div>
      <div className="nav-links">
        {t.nav.map(s=>(<button key={s} className="nav-link" onClick={()=>scrollTo(s)}>{t.navLabels[s]}</button>))}
      </div>
      <div style={{display:'flex',gap:'8px',alignItems:'center',flexShrink:0}}>
        <div className="nav-themes" style={{marginRight:'4px'}}>
          {[['en','🇬🇧'],['fr','🇫🇷']].map(([l,flag])=>(<button key={l} className={`theme-btn${lang===l?' active':''}`} onClick={()=>setLang(l)}>{flag} {l.toUpperCase()}</button>))}
        </div>
        <div className="nav-themes">
          {[['dark','🌙'],['hacker','💻'],['light','☀️']].map(([th,icon])=>(<button key={th} className={`theme-btn${theme===th?' active':''}`} onClick={()=>setTheme(th)}>{icon}</button>))}
        </div>
      </div>
    </nav>

    {/* TICKER */}
    <div className="ticker" style={{marginTop:'60px'}}>
      <div className="ticker-inner">
        {[0,1].map(ri=>(<div key={ri} style={{display:'flex',gap:'48px'}}>
          {(lang==='fr'
            ?['85% de gain en capacité de traitement','30+ workflows automatisés','270% boost efficacité pipeline','Dept Analytics créé en 6 mois','10+ dashboards Power BI','n8n · Python · LLMs · Power BI','40+ concurrents · 1300 SKUs · Daily']
            :['85% processing capacity gain','30+ workflows automated','270% pipeline efficiency boost','Analytics dept built in 6 months','10+ Power BI dashboards','n8n · Python · LLMs · Power BI','40+ competitors monitored · 1,300 SKUs daily']
          ).map((item,i)=>(<div key={i} className="ticker-item">{item}</div>))}
        </div>))}
      </div>
    </div>

    {/* HERO */}
    <section id="about" className="hero">
      <div className="hero-badge">{t.badge}</div>
      <h1 className="hero-h1">
        <div className="glitch-wrap" data-text="ANTOINE">ANTOINE</div>
        <div><span className="accent">DE</span></div>
        <div className="outline">MAINTENANT</div>
      </h1>
      <p className="hero-sub">{t.heroSub1} <span>{t.heroSub1b}</span> {t.heroSub2}<br/>{t.heroSub3}<br/>{t.heroSub4}</p>
      <XPCounter lang={lang}/>
      <div className="typewriter-row" style={{marginTop:'16px'}}><span className="prompt">{'>'}</span>{typed}<span className="t-cursor"/></div>
      <div className="hero-ctas">
        <button className="btn-primary" onClick={()=>scrollTo('roi')}>{t.ctaRoi}</button>
        <button className="btn-secondary" onClick={()=>scrollTo('contact')}>{t.ctaContact}</button>
        <a href="CV_Antoine.pdf" download="CV_Antoine_de_Maintenant_2026.pdf" className="btn-secondary">{t.ctaCV}</a>
      </div>
    </section>

    {/* METRICS — animated counters */}
    <div className="metrics">
      {t.metrics.map((m,i)=><AnimatedMetric key={i} n={m.n} s={m.s} l={m.l}/>)}
    </div>

    {/* DASHBOARD */}
    <div id="dashboard" className="section-full">
      <div className="section-full-inner" style={{paddingTop:'90px',paddingBottom:'90px'}}>
        <div className="section-eyebrow">{t.dashEyebrow}</div>
        <h2 className="section-title">{t.dashTitle} <em>{t.dashTitleEm}</em></h2>
        <p style={{fontSize:'.88rem',color:'var(--text-sec)',maxWidth:'580px',marginBottom:'36px',lineHeight:'1.75'}}>{t.dashDesc}</p>
        <Dashboard lang={lang}/>
      </div>
    </div>

    {/* PIPELINE — drag & drop */}
    <section id="pipeline" className="section">
      <div className="section-eyebrow">{t.pipeEyebrow}</div>
      <h2 className="section-title">{t.pipeTitle} <em>{t.pipeTitleEm}</em></h2>
      <p style={{fontSize:'.88rem',color:'var(--text-sec)',maxWidth:'580px',marginBottom:'36px',lineHeight:'1.75'}}>{t.pipeDesc}</p>
      <Pipeline lang={lang}/>
      <div style={{marginTop:'28px'}} className="terminal reveal">
        <div className="terminal-bar"><div className="t-dot t-red"/><div className="t-dot t-yellow"/><div className="t-dot t-green"/><span className="terminal-path">antoine@automation-engine — forecast.py</span></div>
        <div className="terminal-body">
          <div className="t-line"><span className="t-prompt">$</span> <span className="t-cmd">python forecast_engine.py</span> <span className="t-dim">--client enterprise --sku-level --horizon 13w</span></div>
          {(lang==='fr'
            ?[['→ Connexion entrepôt de données... ','✓'],['→ Chargement 24 mois de données... ','✓ 847 320 lignes'],['→ Décomposition saisonnière STL... ','✓ MAPE : 4,2%'],['→ Génération export Power BI... ','✓ 1,3s'],['→ Envoi au Slack exécutif... ','✓ Livré à 06:00'],null]
            :[['→ Connecting data warehouse... ','✓'],['→ Loading 24mo sell-through data... ','✓ 847,320 rows'],['→ STL seasonality decomposition... ','✓ MAPE: 4.2%'],['→ Generating Power BI export... ','✓ 1.3s'],['→ Sending to executive Slack... ','✓ Delivered 06:00 AM'],null]
          ).map((line,i)=>line
            ?<div key={i} className="t-line"><span>{line[0]}</span><span className="t-hl">{line[1]}</span></div>
            :<div key={i} className="t-line t-dim">{lang==='fr'?"// Avant : 3 analystes × 2 jours. Maintenant : automatisé. Chaque lundi. Pendant le sommeil.":"// Previously: 3 analysts × 2 days. Now: automated. Every Monday. While sleeping."}</div>
          )}
          <div className="t-line"><span className="t-prompt">$</span> <span className="t-cursor"/></div>
        </div>
      </div>
    </section>

    {/* EXPERIENCE */}
    <section id="experience" className="section" style={{background:'var(--bg2)'}}>
      <div style={{maxWidth:'1400px',margin:'0 auto'}}>
        <div className="section-eyebrow">{t.expEyebrow}</div>
        <h2 className="section-title">{t.expTitle} <em>{t.expTitleEm}</em></h2>
        <div className="exp-filter-bar">
          {allTags.map(tag=>(<button key={tag} className={`filter-btn${tagFilter===tag?' active':''}`} onClick={()=>{setTagFilter(tag);if(tag!==t.expFilterAll){const m=exps.findIndex(e=>e.tags.includes(tag));if(m>=0)setActiveExp(m)}else setActiveExp(0)}}>{tag}</button>))}
        </div>
        <div className="exp-layout reveal">
          <div className="exp-nav">
            {exps.map(e=>{const hidden=tagFilter!==t.expFilterAll&&!e.tags.includes(tagFilter);if(hidden)return null;return(<div key={e.id} className={`exp-nav-item${activeExp===e.id?' active':''}`} onClick={()=>setActiveExp(e.id)}><div className="exp-nav-date">{e.date}</div><div className="exp-nav-role">{e.role}</div><div className="exp-nav-co">{e.company}</div></div>);})}
          </div>
          <div className="exp-detail">
            <div className="exp-detail-role">{exp.role}</div>
            <div className="exp-detail-meta"><span>{exp.company}</span><span>·</span><span>{exp.location}</span><span>·</span><span>{exp.revenue}</span></div>
            <ul className="exp-bullets">{exp.highlights.map((h,i)=><li key={i}>{h}</li>)}</ul>
            <div className="exp-tags">{exp.tags.map(tag=><span key={tag} className="exp-tag">{tag}</span>)}</div>
          </div>
        </div>
      </div>
    </section>

    {/* SKILLS + RADAR */}
    <section id="skills" className="section">
      <div className="section-eyebrow">{t.skillsEyebrow}</div>
      <h2 className="section-title">{t.skillsTitle} <span style={{color:'var(--text-dim)'}}>{t.skillsTitleDim}</span></h2>
      <div className="skills-grid">
        {skills.map((s,i)=>(
          <div key={i} className="skill-card reveal">
            <div className="skill-icon">{s.icon}</div>
            <div className="skill-name">{s.name}</div>
            <div className="skill-desc">{s.desc}</div>
            <div className="skill-bar"><div className="skill-fill" style={{width:`${s.pct}%`}}/></div>
            <div className="skill-pct">{s.pct}%</div>
          </div>
        ))}
      </div>
      <RadarChart lang={lang}/>
    </section>

    {/* PROJECTS */}
    <section id="projects" className="section" style={{background:'var(--bg2)'}}>
      <div style={{maxWidth:'1400px',margin:'0 auto'}}>
        <div className="section-eyebrow">{t.projectsEyebrow}</div>
        <h2 className="section-title">{t.projectsTitle} <em>{t.projectsTitleEm}</em></h2>
        <p style={{fontSize:'.88rem',color:'var(--text-sec)',maxWidth:'580px',marginBottom:'40px',lineHeight:'1.75'}}>{t.projectsDesc}</p>
        <Projects lang={lang}/>
      </div>
    </section>

    {/* STACK */}
    <section id="stack" className="section">
      <div style={{maxWidth:'1400px',margin:'0 auto'}}>
        <div className="section-eyebrow">{t.stackEyebrow}</div>
        <h2 className="section-title">{t.stackTitle} <em>{t.stackTitleEm}</em></h2>
        <div className="stack-grid reveal">
          {STACK.map((s,i)=>(<div key={i} className="stack-card"><div className="stack-level">{s.level}</div><span className="stack-emoji">{s.e}</span><div className="stack-name">{s.name}</div><div className="stack-cat">{s.cat}</div></div>))}
        </div>
      </div>
    </section>

    {/* ROI */}
    <section id="roi" className="section" style={{background:'var(--bg2)'}}>
      <div style={{maxWidth:'1400px',margin:'0 auto'}}>
        <div className="section-eyebrow">{t.roiEyebrow}</div>
        <h2 className="section-title">{t.roiTitle} <em>{t.roiTitleEm}</em> {t.roiTitle2}</h2>
        <ROICalc lang={lang}/>
      </div>
    </section>

    {/* TERMINAL CHATBOT */}
    <section id="terminal" className="section">
      <div style={{maxWidth:'1400px',margin:'0 auto'}}>
        <div className="section-eyebrow">{t.terminalEyebrow}</div>
        <h2 className="section-title">{t.terminalTitle} <em>{t.terminalTitleEm}</em></h2>
        <p style={{fontSize:'.88rem',color:'var(--text-sec)',maxWidth:'580px',marginBottom:'36px',lineHeight:'1.75'}}>{t.terminalDesc}</p>
        <TerminalChatbot lang={lang}/>
      </div>
    </section>

    {/* TESTIMONIALS */}
    <section id="testimonials" className="section" style={{background:'var(--bg2)'}}>
      <div style={{maxWidth:'1400px',margin:'0 auto'}}>
        <div className="section-eyebrow">{t.testiEyebrow}</div>
        <h2 className="section-title">{t.testiTitle} <em>{t.testiTitleEm}</em></h2>
        <div className="testi-grid reveal">
          {TESTIMONIALS.map((item,i)=>(
            <div key={i} className="testi-card">
              <div className="testi-stars">{'★'.repeat(item.stars)}</div>
              <div className="testi-quote">{item.q[lang]}</div>
              <div className="testi-author">
                <div className="testi-avatar" style={{background:'rgba(196,78,255,.2)',border:'1px dashed var(--border)',color:'var(--accent1)',fontSize:'.9rem'}}>?</div>
                <div>
                  <div className="testi-name" style={{filter:'blur(4px)',userSelect:'none',color:'var(--text-dim)',fontSize:'.78rem',letterSpacing:'1px'}}>{t.testiBlur}</div>
                  <div className="testi-role">{item.role}</div>
                  <div style={{fontFamily:"'Space Mono',monospace",fontSize:'.44rem',color:'var(--accent3)',letterSpacing:'2px',marginTop:'4px',display:'flex',alignItems:'center',gap:'5px'}}><span style={{width:'5px',height:'5px',borderRadius:'50%',background:'var(--accent3)',display:'inline-block'}}/>{t.testiSoon}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>

    {/* WORLD STRIP */}
    <div className="world-strip">
      <div className="world-inner">
        <span className="world-label">{t.worldLabel}</span>
        {countries.map((c,i)=>(<button key={i} className="country-flag-btn" onClick={()=>setActiveCountry(c)} title={c.n}><img src={`https://flagcdn.com/48x36/${c.iso}.png`} width="48" height="36" alt={c.n}/><span className="country-flag-label">{c.n}</span></button>))}
      </div>
    </div>

    {/* BLOG */}
    <section id="blog" className="section" style={{background:'var(--bg2)'}}>
      <div style={{maxWidth:'1400px',margin:'0 auto'}}>
        <div className="section-eyebrow">{t.blogEyebrow}</div>
        <h2 className="section-title">{t.blogTitle} <em>{t.blogTitleEm}</em></h2>
        <p style={{fontSize:'.88rem',color:'var(--text-sec)',maxWidth:'580px',marginBottom:'40px',lineHeight:'1.75'}}>{t.blogDesc}</p>
        <Blog lang={lang}/>
      </div>
    </section>

    {/* CONTACT */}
    <section id="contact" className="section">
      <div className="section-eyebrow">{t.contactEyebrow}</div>
      <h2 className="section-title">{t.contactTitle} <em>{t.contactTitleEm}</em></h2>
      <div className="contact-layout reveal">
        <div className="contact-cards">
          <CopyEmailButton lang={lang}/>
          <a href="https://www.linkedin.com/in/antoine2maintenant/" target="_blank" rel="noopener noreferrer" className="contact-card"><span className="contact-icon">🔗</span><div><div className="contact-lbl">LinkedIn</div><div className="contact-val">linkedin.com/in/antoine2maintenant</div></div></a>
          <a href="https://github.com/demaintenant-antoine-pro" target="_blank" rel="noopener noreferrer" className="contact-card"><span className="contact-icon">🐙</span><div><div className="contact-lbl">GitHub</div><div className="contact-val">github.com/demaintenant-antoine-pro</div></div></a>
          <div className="contact-card" style={{cursor:'default'}}><span className="contact-icon">📍</span><div><div className="contact-lbl">{t.contactLocation}</div><div className="contact-val">France · Canada (Montréal)</div></div></div>
          <div className="contact-card" style={{cursor:'default'}}><span className="contact-icon">📱</span><div><div className="contact-lbl">{t.contactPhone}</div><div className="contact-val">+1 (263) 385-6506</div></div></div>
        </div>
        <div className="contact-cta reveal">
          <h3>{t.contactH3}</h3>
          <p dangerouslySetInnerHTML={{__html:t.contactP}}/>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:'.6rem',color:'var(--accent1)',letterSpacing:'2px',textTransform:'uppercase',display:'flex',alignItems:'center'}}><span className="status-dot"/>{t.contactStatus}</div>
        </div>
      </div>
    </section>

    <footer className="footer">
      © 2026 Antoine de Maintenant
      <span>{t.footerKonami}</span>
    </footer>
  </LangCtx.Provider>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
