<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════ TOKENS ═══════════════════════ */
:root {
  --bg:#0A0612;--bg2:#110D1E;--bg3:#1A1230;
  --bg-card:rgba(17,13,30,0.95);
  --text:#FFFFFF;--text-sec:#C8BAE8;--text-dim:#7A6B9E;--text-mute:#4A3D6E;
  --accent1:#BF3AFF;--accent2:#FF2D78;--accent3:#00F0A8;--accent4:#FFB800;
  --border:rgba(191,58,255,.4);--border-dim:rgba(191,58,255,.15);
  --nav-bg:rgba(8,4,18,.97);
  --glow1:rgba(191,58,255,.35);--glow2:rgba(255,45,120,.3);--glow3:rgba(0,240,168,.3);
  --glow4:rgba(255,184,0,.25);
}
[data-theme=hacker]{--bg:#010804;--bg2:#021008;--bg3:#031A0C;--bg-card:rgba(2,16,8,.95);--accent1:#00FF88;--accent2:#00FFCC;--accent3:#AAFF00;--accent4:#FFFF00;--text:#AAFFCC;--text-sec:#55DDAA;--text-dim:#33885A;--text-mute:#1A5533;--border:rgba(0,255,136,.3);--border-dim:rgba(0,255,136,.1);--nav-bg:rgba(0,6,2,.97);--glow1:rgba(0,255,136,.25);--glow2:rgba(0,255,204,.2);--glow3:rgba(170,255,0,.2);--glow4:rgba(255,255,0,.2);}
[data-theme=light]{--bg:#FAF7F1;--bg2:#F3EDE3;--bg3:#EAE0D4;--bg-card:rgba(255,252,247,.97);--accent1:#6B3FA0;--accent2:#C2395A;--accent3:#1A7A5E;--accent4:#9A6F0A;--text:#1A1208;--text-sec:#3D2B16;--text-dim:#7A6050;--text-mute:#A8907A;--border:rgba(107,63,160,.25);--border-dim:rgba(107,63,160,.1);--nav-bg:rgba(250,247,241,.97);--glow1:rgba(107,63,160,.1);--glow2:rgba(194,57,90,.08);--glow3:rgba(26,122,94,.08);--glow4:rgba(154,111,10,.1);}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow-x:hidden;cursor:none;transition:background .4s,color .4s}
[data-theme=light] body,[data-theme=light]{background-image:radial-gradient(ellipse at 20% 50%,rgba(107,63,160,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(194,57,90,.03) 0%,transparent 50%)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--accent1),var(--accent2))}

/* ═══════════════════ BOOT SCREEN ═══════════════════ */
#boot{position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .6s}
#boot.hide{opacity:0;pointer-events:none}
.boot-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,8vw,5rem);letter-spacing:8px;color:#fff;text-align:center}
.boot-logo span{color:#BF3AFF}
.boot-lines{font-family:'Space Mono',monospace;font-size:.62rem;color:#444;letter-spacing:2px;text-align:left;width:min(480px,90vw)}
.boot-line{opacity:0;transform:translateY(4px);transition:all .3s;color:#BF3AFF;margin-bottom:3px}
.boot-line.show{opacity:1;transform:none}
.boot-bar-wrap{width:min(480px,90vw);height:3px;background:#111;border-radius:2px;overflow:hidden;margin-top:8px}
.boot-bar{height:100%;width:0%;background:linear-gradient(90deg,#BF3AFF,#FF2D78,#00F0A8);transition:width .1s linear}

/* ═══════════════════ CURSOR ═══════════════════ */
#cur-o{position:fixed;width:28px;height:28px;border:1.5px solid var(--accent1);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s;opacity:.75}
#cur-i{position:fixed;width:5px;height:5px;background:var(--accent2);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}
body.hovering #cur-o{width:44px;height:44px;border-color:var(--accent2);opacity:1}

/* ═══════════════════ XP SYSTEM ═══════════════════ */
#xp-hud{position:fixed;top:68px;right:20px;z-index:490;background:var(--bg-card);border:1px solid var(--border-dim);border-radius:12px;padding:10px 16px;backdrop-filter:blur(16px);min-width:200px;transition:all .3s}
.xp-title{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:3px;color:var(--accent1);text-transform:uppercase;margin-bottom:5px;display:flex;justify-content:space-between}
.xp-bar-bg{height:4px;background:var(--border-dim);border-radius:2px;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2),var(--accent3));transition:width .6s cubic-bezier(.16,1,.3,1);border-radius:2px}
.xp-pts{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--accent4);line-height:1;margin-top:4px}
.xp-lv{font-family:'Space Mono',monospace;font-size:.48rem;color:var(--text-dim);letter-spacing:2px}

/* XP Achievement toast */
.achieve-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:9997;background:var(--bg-card);border:1px solid var(--accent4);border-radius:12px;padding:12px 24px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(20px);box-shadow:0 0 40px var(--glow4);transition:transform .5s cubic-bezier(.16,1,.3,1),opacity .5s;opacity:0;pointer-events:none;white-space:nowrap}
.achieve-toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.achieve-icon{font-size:1.4rem}
.achieve-text{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--accent4);letter-spacing:2px;text-transform:uppercase}
.achieve-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--text);letter-spacing:1px}

/* ═══════════════════ HIRE PROGRESS ═══════════════════ */
#hire-progress{position:fixed;bottom:0;left:0;right:0;z-index:490;height:3px;background:transparent}
.hire-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent1),var(--accent2),var(--accent3),var(--accent4));transition:width .2s;box-shadow:0 0 10px var(--glow1)}

/* CHAPTER NAV */
#chapter-nav{position:fixed;left:20px;top:50%;transform:translateY(-50%);z-index:490;display:flex;flex-direction:column;gap:8px}
.ch-dot{width:8px;height:8px;border-radius:50%;background:var(--border-dim);cursor:pointer;transition:all .3s;border:1px solid var(--border-dim)}
.ch-dot.active{background:var(--accent1);box-shadow:0 0 10px var(--glow1);transform:scale(1.4)}
.ch-dot:hover{background:var(--accent2)}
.ch-label{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-family:'Space Mono',monospace;font-size:.44rem;color:var(--accent1);letter-spacing:2px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;text-transform:uppercase}
.ch-dot:hover .ch-label{opacity:1}

/* ═══════════════════ NAV ═══════════════════ */
.nav{position:fixed;top:0;left:0;right:0;z-index:500;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-dim);height:60px;display:flex;align-items:center;padding:0 28px;gap:24px}
.nav-logo{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--accent1);letter-spacing:3px;white-space:nowrap;flex-shrink:0;cursor:pointer}
.nav-logo:hover{color:var(--accent2)}
.nav-links{display:flex;gap:2px;flex:1;justify-content:center;flex-wrap:nowrap;overflow:hidden}
.nav-link{font-family:'Space Mono',monospace;font-size:.48rem;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:color .2s,background .2s;border:none;background:none;padding:5px 7px;border-radius:4px;white-space:nowrap}
.nav-link:hover{color:var(--accent2);background:rgba(255,45,120,.07)}
.nav-controls{display:flex;gap:6px;flex-shrink:0;align-items:center}
.nav-themes{display:flex;gap:1px;background:rgba(255,255,255,.04);border:1px solid var(--border-dim);border-radius:6px;overflow:hidden}
.theme-btn{font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:1px;text-transform:uppercase;padding:6px 10px;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.theme-btn.active{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff}
.theme-btn:not(.active){background:transparent;color:var(--text-dim)}
.theme-btn:not(.active):hover{background:rgba(255,255,255,.06);color:var(--text)}
.recruiter-btn{font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border:1px solid var(--accent4);background:rgba(255,184,0,.08);color:var(--accent4);border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap}
.recruiter-btn:hover{background:rgba(255,184,0,.18);box-shadow:0 0 16px var(--glow4)}
.recruiter-btn.active{background:var(--accent4);color:#000}

/* ═══════════════════ TICKER ═══════════════════ */
.ticker{position:relative;z-index:5;background:rgba(191,58,255,.08);border-top:1px solid rgba(191,58,255,.18);border-bottom:1px solid rgba(191,58,255,.18);padding:11px 0;overflow:hidden}
[data-theme=light] .ticker{background:rgba(107,63,160,.05);border-color:rgba(107,63,160,.12)}
.ticker-inner{display:flex;gap:48px;white-space:nowrap;animation:tickerScroll 32s linear infinite}
@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{font-family:'Space Mono',monospace;font-size:.56rem;color:var(--accent1);letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.ticker-item::before{content:'◆';color:var(--accent2);font-size:.4rem}

/* ═══════════════════ SCROLL PROGRESS ═══════════════════ */
.scroll-bar{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,var(--accent1),var(--accent2),var(--accent3));z-index:9997;box-shadow:0 0 8px var(--glow1)}

/* ═══════════════════ PARTICLES/BG ═══════════════════ */
#three-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.85;transition:opacity .4s}
[data-theme=light] #three-canvas{opacity:0;pointer-events:none}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:1;background-image:linear-gradient(rgba(191,58,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(191,58,255,.05) 1px,transparent 1px);background-size:64px 64px}
[data-theme=light] .grid-bg{display:none}
.scanline{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(191,58,255,.1),transparent);z-index:2;pointer-events:none;animation:scan 10s linear infinite}
[data-theme=light] .scanline{display:none}
@keyframes scan{from{top:-2px}to{top:100vh}}

/* ═══════════════════ HERO ═══════════════════ */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:120px 80px 80px;position:relative;z-index:5;max-width:1500px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:10px;font-family:'Space Mono',monospace;font-size:.55rem;color:var(--accent1);letter-spacing:4px;text-transform:uppercase;border:1px solid var(--border);padding:7px 18px;border-radius:2px;margin-bottom:36px;width:fit-content}
.hero-badge-wrap{display:inline-flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:36px}
.hero-badge-dot{width:8px;height:8px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite;flex-shrink:0}
.hero-badge-status{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--accent3);letter-spacing:3px;text-transform:uppercase}
.hero-city-pill{font-family:'Space Mono',monospace;font-size:.48rem;color:var(--accent1);letter-spacing:2px;text-transform:uppercase;border:1px solid var(--border-dim);padding:4px 10px;border-radius:20px;background:rgba(191,58,255,.06);transition:all .2s;cursor:default}
.hero-city-pill:hover{border-color:var(--accent1);background:rgba(191,58,255,.15);transform:translateY(-1px);box-shadow:0 0 10px var(--glow1)}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite}
.hero-h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,12vw,11rem);line-height:.85;letter-spacing:2px;margin-bottom:6px;will-change:transform;transition:transform .05s linear}
.hero-h1 .accent{color:var(--accent2)}
.hero-h1 .outline{-webkit-text-stroke:1.5px var(--border);color:transparent}
.hero-sub{font-size:1rem;color:var(--text-sec);max-width:520px;line-height:1.9;margin:24px 0 36px}
.hero-sub span{color:var(--accent1)}
.typewriter-row{font-family:'Space Mono',monospace;font-size:.82rem;color:var(--accent1);margin-bottom:36px;display:flex;align-items:center;gap:8px}
.typewriter-row .prompt{color:var(--text-mute)}
.t-cursor{display:inline-block;width:8px;height:13px;background:var(--accent1);animation:blink 1s infinite;vertical-align:middle;margin-left:2px}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;padding:14px 30px;border:none;cursor:pointer;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);transition:all .25s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 40px var(--glow1)}
.btn-secondary{background:rgba(191,58,255,.08);color:var(--text-sec);font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;padding:14px 30px;border:1px solid var(--border);cursor:pointer;transition:all .25s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.btn-secondary:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(255,45,120,.07)}
[data-theme=light] .btn-secondary{background:rgba(114,0,212,.07)}

/* LIVE COUNTER */
.live-counter{display:inline-flex;align-items:center;gap:14px;background:rgba(0,240,168,.06);border:1px solid rgba(0,240,168,.2);padding:10px 20px;border-radius:8px;margin-top:16px}
.lc-label{font-family:'Space Mono',monospace;font-size:.5rem;color:var(--accent3);letter-spacing:2px;text-transform:uppercase}
.lc-val{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent3);line-height:1;min-width:60px}

/* ═══════════════════ METRICS ═══════════════════ */
.metrics{position:relative;z-index:5;display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border-dim);background:var(--bg2)}
.metric{padding:32px 24px;text-align:center;border-right:1px solid var(--border-dim)}
.metric:last-child{border-right:none}
.metric-num{font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block}
.metric-lbl{font-family:'Space Mono',monospace;font-size:.5rem;color:var(--text-sec);letter-spacing:2px;text-transform:uppercase;margin-top:5px;display:block}

/* ═══════════════════ CHAPTER HEADERS ═══════════════════ */
.chapter-header{position:relative;z-index:5;padding:60px 80px 0;max-width:1500px;margin:0 auto}
.chapter-num{font-family:'Bebas Neue',sans-serif;font-size:8rem;color:var(--border-dim);line-height:1;position:absolute;top:20px;right:80px;letter-spacing:-4px;user-select:none}
.chapter-label{font-family:'Space Mono',monospace;font-size:.56rem;color:var(--accent2);letter-spacing:5px;text-transform:uppercase;margin-bottom:8px}

/* ═══════════════════ SECTIONS ═══════════════════ */
.section{padding:80px 80px;position:relative;z-index:5;max-width:1500px;margin:0 auto}
.section-full{padding:80px 0;position:relative;z-index:5;background:var(--bg2)}
.section-full-inner{max-width:1500px;margin:0 auto;padding:0 80px}
.section-eyebrow{font-family:'Space Mono',monospace;font-size:.54rem;color:var(--accent2);letter-spacing:4px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.section-eyebrow::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--accent2),transparent);opacity:.35}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,4rem);line-height:1;letter-spacing:2px;margin-bottom:48px;color:var(--text)}
.section-title em{color:var(--accent1);font-style:normal}

/* ═══════════════════ SCROLL REVEAL ═══════════════════ */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:none}
.reveal-left{opacity:0;transform:translateX(-40px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}
.reveal-left.visible{opacity:1;transform:none}
.reveal-right{opacity:0;transform:translateX(40px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}
.reveal-right.visible{opacity:1;transform:none}
.reveal-scale{opacity:0;transform:scale(.88);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}
.reveal-scale.visible{opacity:1;transform:none}
.reveal-delay-1{transition-delay:.1s}
.reveal-delay-2{transition-delay:.2s}
.reveal-delay-3{transition-delay:.3s}
.reveal-delay-4{transition-delay:.4s}
.reveal-delay-5{transition-delay:.5s}

/* ═══════════════════ DASHBOARD ═══════════════════ */
.dashboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.kpi-box{padding:18px;border:1px solid var(--border-dim);border-radius:10px;background:var(--bg-card);backdrop-filter:blur(10px);transition:all .25s;position:relative;overflow:hidden}
.kpi-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--glow1),transparent);opacity:0;transition:opacity .3s}
.kpi-box:hover{border-color:var(--accent1);transform:translateY(-3px);box-shadow:0 8px 28px var(--glow1)}
.kpi-box:hover::before{opacity:1}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent1);line-height:1}
.kpi-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.kpi-delta{font-size:10px;color:var(--accent3);margin-top:2px;font-family:'Space Mono',monospace}
.chart-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:14px}
.chart-box{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:10px;padding:20px}
.chart-title{font-size:10px;font-weight:600;color:var(--text-dim);margin-bottom:12px;letter-spacing:2px;text-transform:uppercase;font-family:'Space Mono',monospace}
.chart-wrap{position:relative;height:190px}

/* ═══════════════════ PIPELINE ═══════════════════ */
.pipeline-wrap{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:12px;padding:32px}
.pipeline-stages{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:24px;gap:0}
.p-node{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 14px;border-radius:10px;border:2px solid var(--border-dim);background:var(--bg);transition:all .4s;min-width:95px;text-align:center;cursor:grab;user-select:none}
.p-node:active{cursor:grabbing}
.p-node.running{border-color:var(--accent1);box-shadow:0 0 18px var(--glow1);background:rgba(191,58,255,.08)}
.p-node.done{border-color:var(--accent3);box-shadow:0 0 14px var(--glow3)}
.p-node.dragging{opacity:.35;transform:scale(.93)}
.p-node.drag-over{border-color:var(--accent2);box-shadow:0 0 18px var(--glow2);transform:scale(1.06)}
.p-node.wrong-order{border-color:#ff4444;box-shadow:0 0 18px rgba(255,68,68,.4);animation:shake .4s ease}
.p-node-icon{font-size:22px}
.p-node-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim)}
.p-node-detail{font-size:8px;color:var(--text-mute);font-family:'Space Mono',monospace}
.p-node.done{border-color:var(--accent3);background:rgba(0,240,168,.08)}
.p-node.done .p-node-icon{opacity:.5}
.p-node-tick{position:absolute;top:-8px;right:-8px;width:18px;height:18px;border-radius:50%;background:var(--accent3);color:#000;font-size:.55rem;display:flex;align-items:center;justify-content:center;font-weight:900;box-shadow:0 0 10px var(--glow3);animation:popIn .3s cubic-bezier(.16,1,.3,1)}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.p-connector{width:30px;height:3px;background:var(--border-dim);flex-shrink:0}
.p-connector-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent1),var(--accent3));transition:width .5s}
.pipeline-log{background:#000208;border:1px solid var(--border-dim);border-radius:8px;padding:12px;font-family:'Space Mono',monospace;font-size:11px;height:120px;overflow-y:auto;margin-bottom:16px;color:var(--accent3)}
.log-line{margin-bottom:2px;line-height:1.6}
.run-btn{display:block;margin:0 auto;padding:12px 40px;background:linear-gradient(135deg,var(--accent1),var(--accent2));border:none;border-radius:8px;color:#fff;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .3s}
.run-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px var(--glow1)}
.run-btn:disabled{opacity:.5;cursor:not-allowed}
.drag-hint{font-family:'Space Mono',monospace;font-size:.48rem;color:var(--text-mute);letter-spacing:2px;text-align:center;margin-bottom:12px}
.wrong-order-msg{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.25);border-radius:8px;padding:10px 16px;font-family:'Space Mono',monospace;font-size:.58rem;color:#ff6666;text-align:center;margin-bottom:12px;animation:fadeIn .3s}

/* ═══════════════════ EXPERIENCE ═══════════════════ */
.exp-filter-bar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:28px}
.filter-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border-dim);background:transparent;color:var(--text-dim);font-size:10px;font-family:'Space Mono',monospace;cursor:pointer;transition:all .2s;letter-spacing:1px}
.filter-btn.active,.filter-btn:hover{background:var(--accent1);color:#fff;border-color:var(--accent1)}
.exp-layout{display:grid;grid-template-columns:250px 1fr;gap:36px}
.exp-nav-item{padding:16px 18px;cursor:pointer;transition:all .2s;border-left:2px solid transparent;border-bottom:1px solid var(--border-dim)}
.exp-nav-item:hover{background:rgba(191,58,255,.05)}
.exp-nav-item.active{background:rgba(191,58,255,.08);border-left-color:var(--accent2)}
.exp-nav-date{font-family:'Space Mono',monospace;font-size:.48rem;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.exp-nav-role{font-size:.84rem;font-weight:700;margin-bottom:2px;color:var(--text)}
.exp-nav-co{font-size:.72rem;color:var(--text-dim)}
.exp-detail{background:var(--bg-card);border:1px solid var(--border-dim);padding:32px;position:sticky;top:72px;border-radius:8px}
.exp-detail-role{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:2px;margin-bottom:4px;color:var(--text)}
.exp-detail-meta{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;display:flex;gap:10px;flex-wrap:wrap}
.exp-bullets{list-style:none;display:flex;flex-direction:column;gap:12px}
.exp-bullets li{display:flex;gap:10px;font-size:.86rem;color:var(--text-sec);line-height:1.7}
.exp-bullets li::before{content:'→';color:var(--accent1);flex-shrink:0;margin-top:2px}
.exp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:20px}
.exp-tag{background:rgba(191,58,255,.08);border:1px solid var(--border-dim);color:var(--accent1);font-family:'Space Mono',monospace;font-size:.46rem;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:2px}

/* ═══════════════════ SKILLS ═══════════════════ */
.skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.skill-card{background:var(--bg-card);border:1px solid var(--border-dim);padding:20px;transition:all .3s;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);position:relative;overflow:hidden}
.skill-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent1),var(--accent2));transform:scaleX(0);transform-origin:left;transition:transform .4s}
.skill-card:hover{border-color:var(--accent1);transform:translateY(-4px);box-shadow:0 12px 32px var(--glow1)}
.skill-card:hover::after{transform:scaleX(1)}
.skill-icon{font-size:1.5rem;margin-bottom:10px}
.skill-name{font-size:.9rem;font-weight:700;margin-bottom:4px;color:var(--text)}
.skill-desc{font-size:.72rem;color:var(--text-sec);line-height:1.55}
.skill-bar{height:2px;background:var(--border-dim);margin-top:12px;overflow:hidden}
.skill-fill{height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2))}
.skill-pct{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--accent1);margin-top:5px;text-align:right}

/* RADAR */
.radar-wrap{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:12px;padding:28px;display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:center;margin-top:40px}
.radar-chart-wrap{position:relative;height:300px;max-width:360px;margin:0 auto;width:100%}
.radar-legend{display:flex;flex-direction:column;gap:14px}
.radar-legend-item{display:flex;align-items:center;gap:10px}
.radar-legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.radar-legend-label{font-size:.82rem;font-weight:600;color:var(--text);flex:1}
.radar-legend-sub{font-size:.68rem;color:var(--text-dim);margin-top:1px}
.radar-legend-pct{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--accent1)}

/* ═══════════════════ STACK ═══════════════════ */
.stack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.stack-card{background:var(--bg-card);border:1px solid var(--border-dim);padding:18px 12px;text-align:center;transition:all .3s;border-radius:6px;position:relative;overflow:hidden;cursor:default}
.stack-card:hover{border-color:var(--accent1);transform:translateY(-5px);box-shadow:0 14px 32px var(--glow1)}
.stack-emoji{font-size:1.4rem;margin-bottom:8px;display:block;transition:transform .3s}
.stack-card:hover .stack-emoji{transform:scale(1.2) rotate(-5deg)}
.stack-name{font-size:.74rem;font-weight:700;color:var(--text);margin-bottom:2px}
.stack-cat{font-family:'Space Mono',monospace;font-size:.42rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase}
.stack-level{position:absolute;top:6px;right:6px;font-family:'Space Mono',monospace;font-size:.4rem;color:var(--accent3);background:rgba(0,240,168,.08);border:1px solid rgba(0,240,168,.18);padding:2px 4px;border-radius:2px}

/* ═══════════════════ ROI ═══════════════════ */
.roi-wrap{background:var(--bg-card);border:1px solid var(--border-dim);padding:36px;border-radius:8px;position:relative;overflow:hidden}
.roi-wrap::before{content:'// ROI CALCULATOR v2';position:absolute;top:14px;right:18px;font-family:'Space Mono',monospace;font-size:.42rem;color:var(--text-mute);letter-spacing:3px}
.roi-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:start}
.roi-inputs{display:flex;flex-direction:column;gap:20px}
.roi-input-group label{display:block;font-family:'Space Mono',monospace;font-size:.52rem;color:var(--text-sec);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.roi-val-badge{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--accent1);margin-left:8px}
input[type=range]{width:100%;appearance:none;height:3px;background:var(--border-dim);outline:none;border-radius:2px}
input[type=range]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--accent1),var(--accent2));cursor:pointer}
.roi-out{background:rgba(5,2,18,.8);border:1px solid var(--border-dim);padding:24px;display:flex;flex-direction:column;gap:16px;border-radius:6px}
.roi-metric{border-bottom:1px solid var(--border-dim);padding-bottom:14px}
.roi-metric:last-child{border:none;padding:0}
.roi-metric-lbl{font-family:'Space Mono',monospace;font-size:.48rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.roi-metric-val{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;line-height:1;letter-spacing:2px}
.roi-metric-val.pink{color:var(--accent2)}
.roi-metric-val.purple{color:var(--accent1)}
.roi-metric-val.green{color:var(--accent3)}
.roi-helper{font-size:.64rem;color:var(--text-dim);margin-top:3px}
.roi-savings-box{background:rgba(0,240,168,.06);border:1px solid rgba(0,240,168,.16);padding:16px;border-radius:6px}
[data-theme=light] .roi-out{background:rgba(232,224,245,.9)}

/* ═══════════════════ TERMINAL CHATBOT ═══════════════════ */
.terminal-chat{background:#03000F;border:1px solid var(--border-dim);border-radius:8px;overflow:hidden;max-width:720px;margin:0 auto}
[data-theme=light] .terminal-chat{background:#1C0D2E}
.chat-bar{background:rgba(191,58,255,.06);border-bottom:1px solid var(--border-dim);padding:9px 16px;display:flex;align-items:center;gap:7px}
.t-dot{width:9px;height:9px;border-radius:50%}
.t-red{background:#FF5F57}.t-yellow{background:#FEBC2E}.t-green{background:#28C840}
.terminal-path{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--text-mute);margin-left:8px;letter-spacing:2px}
.chat-output{padding:18px 22px;font-family:'Space Mono',monospace;font-size:.68rem;line-height:1.8;height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;color:#C8B8E8}
.chat-line-user{color:var(--accent1)}
.chat-line-sys{color:var(--accent3)}
.chat-line-err{color:#ff6666}
.chat-line-dim{color:var(--text-mute)}
.chat-line-info{color:var(--text-sec)}
.chat-line-acc2{color:var(--accent2)}
.chat-line-acc4{color:var(--accent4)}
.chat-input-row{display:flex;align-items:center;padding:10px 18px;border-top:1px solid var(--border-dim);gap:7px}
.chat-prompt-label{color:var(--accent1);font-family:'Space Mono',monospace;font-size:.72rem;white-space:nowrap}
.chat-input{background:transparent;border:none;outline:none;font-family:'Space Mono',monospace;font-size:.72rem;color:#E0D8F8;flex:1;caret-color:var(--accent1)}
.chat-hint{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--text-mute);letter-spacing:2px;text-align:center;padding:7px;border-top:1px solid var(--border-dim)}

/* ═══════════════════ TESTIMONIALS ═══════════════════ */
.testi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.testi-card{background:var(--bg-card);border:1px solid var(--border-dim);padding:26px;position:relative;transition:all .25s;border-radius:6px;overflow:hidden}
.testi-card::before{content:'"';position:absolute;top:-10px;left:16px;font-family:'Bebas Neue',sans-serif;font-size:8rem;color:var(--border-dim);line-height:1;pointer-events:none}
.testi-card:hover{border-color:var(--accent1);transform:translateY(-4px);box-shadow:0 14px 36px var(--glow1)}
.testi-stars{position:absolute;top:18px;right:18px;color:#FFB800;font-size:.7rem;letter-spacing:2px}
.testi-quote{font-size:.82rem;color:var(--text-sec);line-height:1.85;margin-bottom:18px;padding-left:14px;border-left:3px solid var(--accent1);position:relative;z-index:1}
.testi-author{display:flex;align-items:center;gap:9px}
.testi-avatar{width:36px;height:36px;border-radius:50%;background:rgba(191,58,255,.2);border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.testi-name{font-size:.82rem;font-weight:700;color:var(--text)}
.testi-role{font-family:'Space Mono',monospace;font-size:.42rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

/* ═══════════════════ WORLD STRIP ═══════════════════ */
.world-map-section{position:relative;z-index:5;border-top:1px solid var(--border-dim);border-bottom:1px solid var(--border-dim);padding:32px 0;background:var(--bg2)}
.world-map-header{display:flex;justify-content:space-between;align-items:center;padding:0 40px;margin-bottom:16px}
.world-map-label{font-family:'Space Mono',monospace;font-size:.48rem;color:var(--accent1);letter-spacing:3px;text-transform:uppercase}
.world-map-count{font-family:'Space Mono',monospace;font-size:.42rem;color:var(--text-mute);letter-spacing:2px}
.world-map-wrap{padding:0 20px}
.world-map-container{position:relative;width:100%;border-radius:8px;overflow:hidden;border:1px solid var(--border-dim);margin-bottom:16px;background:rgba(10,6,18,0.6)}
[data-theme=light] .world-map-container{background:rgba(240,235,255,0.5)}
.world-svg{display:block;width:100%;height:auto}
.country-path{transition:fill .25s,stroke-width .25s}
@keyframes countryPulse{0%,100%{opacity:1}50%{opacity:.65}}
@keyframes mapGlow{0%,100%{filter:drop-shadow(0 0 4px var(--accent1)) drop-shadow(0 0 8px var(--accent1))}50%{filter:drop-shadow(0 0 8px var(--accent1)) drop-shadow(0 0 18px var(--accent1)) drop-shadow(0 0 30px var(--accent2))}}
.map-pulse-outer{animation:mapPulse 2s ease-in-out infinite}
@keyframes mapPulse{0%,100%{r:16;opacity:0.3}50%{r:24;opacity:0.08}}
.world-flags-row{display:flex;gap:24px;align-items:center;justify-content:center;flex-wrap:wrap;padding:0 20px}
.world-label{font-family:'Space Mono',monospace;font-size:.48rem;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase}
.country-flag-btn{cursor:pointer;transition:transform .2s;display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;padding:0}
.country-flag-btn:hover{transform:scale(1.14)}
.country-flag-btn img{border-radius:4px;border:2px solid var(--border-dim);box-shadow:0 2px 8px rgba(0,0,0,.25);transition:border-color .2s;display:block}
.country-flag-btn:hover img{border-color:var(--accent2)}
.country-flag-label{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--text-sec);letter-spacing:2px}

/* ═══════════════════ BLOG ═══════════════════ */
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.blog-card{background:var(--bg-card);border:1px solid var(--border-dim);border-radius:10px;padding:22px;transition:all .3s;cursor:pointer;position:relative;overflow:hidden}
.blog-card:hover{border-color:var(--accent1);transform:translateY(-4px);box-shadow:0 12px 32px var(--glow1)}
.blog-tag{font-family:'Space Mono',monospace;font-size:.42rem;color:var(--accent2);background:rgba(255,45,120,.07);border:1px solid rgba(255,45,120,.18);padding:3px 9px;border-radius:20px;letter-spacing:2px;text-transform:uppercase;display:inline-block;margin-bottom:10px}
.blog-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1.5px;margin-bottom:7px;color:var(--text);line-height:1.2}
.blog-excerpt{font-size:.74rem;color:var(--text-sec);line-height:1.7;margin-bottom:12px}
.blog-meta{font-family:'Space Mono',monospace;font-size:.42rem;color:var(--text-mute);letter-spacing:1px;display:flex;gap:10px}
.blog-read-more{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--accent1);letter-spacing:2px;text-transform:uppercase;margin-top:8px;display:flex;align-items:center;gap:4px}

/* ═══════════════════ CONTACT ═══════════════════ */
.contact-layout{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:start}
.contact-cards{display:flex;flex-direction:column;gap:10px}
.contact-card{background:var(--bg-card);border:1px solid var(--border-dim);padding:18px 22px;transition:all .25s;border-radius:6px;display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--text)}
.contact-card:hover{border-color:var(--accent2);transform:translateX(4px);box-shadow:4px 0 20px var(--glow2)}
.contact-icon{font-size:1.3rem;flex-shrink:0}
.contact-lbl{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.contact-val{font-size:.84rem;color:var(--text);font-weight:600}
.contact-cta{background:var(--bg-card);border:1px solid var(--border-dim);padding:32px;border-radius:8px}
.contact-cta h3{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;margin-bottom:12px;color:var(--text)}
.contact-cta p{font-size:.84rem;color:var(--text-sec);line-height:1.85;margin-bottom:24px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite;display:inline-block;margin-right:7px}

/* ═══════════════════ MODALS ═══════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(5,2,16,.96);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.modal{background:var(--bg2);border:1px solid var(--border);padding:40px;max-width:520px;width:90%;text-align:center;animation:popIn .5s cubic-bezier(.16,1,.3,1);box-shadow:0 0 80px var(--glow1);border-radius:8px}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:3px;color:var(--accent2);margin-bottom:12px}
.modal p{font-size:.82rem;color:var(--text-sec);line-height:1.8;margin-bottom:20px}
.modal-code{font-family:'Space Mono',monospace;font-size:.64rem;color:var(--text-dim);margin-bottom:20px;background:rgba(191,58,255,.06);padding:12px 14px;border-left:2px solid var(--accent1);text-align:left;border-radius:0 4px 4px 0;line-height:1.8}
.modal-close{background:rgba(191,58,255,.1);border:1px solid var(--border);color:var(--accent1);font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:2px;text-transform:uppercase;padding:10px 24px;cursor:pointer;transition:all .2s;border-radius:4px}
.modal-close:hover{background:rgba(255,45,120,.1);border-color:var(--accent2);color:var(--accent2)}
.country-modal-overlay{position:fixed;inset:0;background:rgba(5,2,16,.88);z-index:900;display:flex;align-items:center;justify-content:center;animation:fadeIn .25s ease;padding:20px}
.country-modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;max-width:500px;width:100%;animation:popIn .35s cubic-bezier(.16,1,.3,1);overflow:hidden;box-shadow:0 0 60px var(--glow1)}
.country-modal-header{padding:24px 28px 18px;border-bottom:1px solid var(--border-dim);display:flex;align-items:center;gap:14px}
.country-modal-flag{width:52px;height:39px;border-radius:5px;border:2px solid var(--border-dim);object-fit:cover}
.country-modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;color:var(--text)}
.country-modal-sub{font-family:'Space Mono',monospace;font-size:.48rem;color:var(--accent2);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.country-modal-body{padding:20px 28px 24px;display:flex;flex-direction:column;gap:10px}
.country-modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.country-modal-tag{font-family:'Space Mono',monospace;font-size:.42rem;color:var(--accent1);background:rgba(191,58,255,.07);border:1px solid var(--border-dim);padding:2px 9px;border-radius:20px;letter-spacing:1px}
.country-modal-text{font-size:.84rem;color:var(--text-sec);line-height:1.85}
.country-modal-close{display:block;margin:4px auto 0;background:rgba(191,58,255,.08);border:1px solid var(--border-dim);color:var(--text-dim);font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:2px;text-transform:uppercase;padding:9px 22px;cursor:pointer;border-radius:4px;transition:all .2s}
.country-modal-close:hover{border-color:var(--accent2);color:var(--accent2)}

</div>

<script>
/* ═══════════ BOOT SEQUENCE ═══════════ */
(function(){
  const lines=[
    '> INITIALIZING ADM.SYS v5.0...',
    '> LOADING NEURAL INTERFACE...',
    '> MOUNTING DATA PIPELINES... OK',
    '> CONNECTING AUTOMATION ENGINE... OK',
    '> SPAWNING PARTICLE SYSTEM... OK',
    '> READY.'
  ];
  const container=document.getElementById('boot-lines');
  const bar=document.getElementById('boot-bar');
  let i=0;
  function showLine(){
    if(i>=lines.length){
      setTimeout(()=>{
        document.getElementById('boot').classList.add('hide');
        setTimeout(()=>document.getElementById('boot').remove(),700);
      },300);
      return;
    }
    const d=document.createElement('div');
    d.className='boot-line';
    d.textContent=lines[i];
    container.appendChild(d);
    requestAnimationFrame(()=>requestAnimationFrame(()=>d.classList.add('show')));
    bar.style.width=((i+1)/lines.length*100)+'%';
    i++;
    setTimeout(showLine,i===lines.length?100:260);
  }
  setTimeout(showLine,200);
})();

/* ═══════════ CURSOR ═══════════ */
const co=document.getElementById('cur-o'),ci=document.getElementById('cur-i');
let mx=0,my=0,ox=0,oy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;ci.style.left=mx+'px';ci.style.top=my+'px'});
(function anim(){ox+=(mx-ox)*.12;oy+=(my-oy)*.12;co.style.left=ox+'px';co.style.top=oy+'px';requestAnimationFrame(anim)})();
document.addEventListener('mouseover',e=>{if(e.target.closest('a,button,[role=button]'))document.body.classList.add('hovering');else document.body.classList.remove('hovering')});

/* ═══════════ THREE.JS SPHERE ═══════════ */
(function(){
  const canvas=document.getElementById('three-canvas');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setClearColor(0x000000,0);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,1000);
  camera.position.z=4;

  function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
  resize();window.addEventListener('resize',resize);

  // Particle sphere
  const N=1800;
  const positions=new Float32Array(N*3);
  const colors=new Float32Array(N*3);
  const c1=new THREE.Color('#BF3AFF'),c2=new THREE.Color('#FF2D78'),c3=new THREE.Color('#00F0A8');
  for(let i=0;i<N;i++){
    const phi=Math.acos(-1+2*i/N);
    const theta=Math.sqrt(N*Math.PI)*phi*(1+Math.random()*.3-.15);
    const r=1.6+Math.random()*.15;
    positions[i*3]=r*Math.sin(phi)*Math.cos(theta);
    positions[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
    positions[i*3+2]=r*Math.cos(phi);
    const t=Math.random();
    const col=t<.33?c1.clone().lerp(c2,t*3):t<.66?c2.clone().lerp(c3,(t-.33)*3):c3.clone().lerp(c1,(t-.66)*3);
    colors[i*3]=col.r;colors[i*3+1]=col.g;colors[i*3+2]=col.b;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  const mat=new THREE.PointsMaterial({size:.025,vertexColors:true,transparent:true,opacity:.9,sizeAttenuation:true});
  const sphere=new THREE.Points(geo,mat);
  scene.add(sphere);

  // Orbiting rings
  for(let r=0;r<3;r++){
    const ringGeo=new THREE.TorusGeometry(1.6+r*.35,0.003,2,120);
    const ringMat=new THREE.MeshBasicMaterial({color:r===0?0xBF3AFF:r===1?0xFF2D78:0x00F0A8,transparent:true,opacity:.18+r*.06});
    const ring=new THREE.Mesh(ringGeo,ringMat);
    ring.rotation.x=Math.PI/2+r*.7;ring.rotation.y=r*.5;
    scene.add(ring);
  }

  let mouseX=0,mouseY=0;
  document.addEventListener('mousemove',e=>{mouseX=(e.clientX/innerWidth-.5)*2;mouseY=-(e.clientY/innerHeight-.5)*2;});

  let t=0;
  function animate(){
    requestAnimationFrame(animate);
    t+=.003;
    sphere.rotation.y=t+mouseX*.3;
    sphere.rotation.x=mouseY*.15;

const SFX={
  on:false,
  ctx:null,
  init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();},
  play(freq,dur,type='square',vol=.08){
    if(!this.on)return;
    try{this.init();const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.connect(g);g.connect(this.ctx.destination);o.type=type;o.frequency.setValueAtTime(freq,this.ctx.currentTime);g.gain.setValueAtTime(vol,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+dur);o.start();o.stop(this.ctx.currentTime+dur);}catch(e){}
  },
  click(){this.play(440,.06,'square',.06);},
  hover(){this.play(660,.04,'square',.03);},
  success(){[523,659,784].forEach((f,i)=>setTimeout(()=>this.play(f,.12,'square',.07),i*80));},
  error(){[220,196,.15,'sawtooth',.1].slice(0,3).forEach((f,i)=>typeof f==='number'&&setTimeout(()=>this.play(f,.18,'sawtooth',.09),i*60));},
  achieve(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.play(f,.1,'square',.08),i*60));},
  toggle(){this.on=!this.on;if(this.on){this.init();this.success();}return this.on;}
};

  earn(trigger){
    const ach=this.achievements.find(a=>a.trigger===trigger&&!this.unlocked.has(a.id));
    if(ach){
      this.unlocked.add(ach.id);
      this.points+=ach.pts;
      this.update();
      this.showAchievement(ach);
    }
    // section bonus
    if(!this.sections[trigger]){
      this.sections[trigger]=true;
      this.points+=20;
      this.update();
    }
  },
  update(){
    const max=1775;
    const pct=Math.min(this.points/max*100,100);
    const lv=Math.floor(this.points/200)+1;
    document.getElementById('xp-pts').textContent=this.points+' XP';
    document.getElementById('xp-bar').style.width=((this.points%200)/200*100)+'%';
    document.getElementById('xp-level').textContent='LV.'+lv;
    document.getElementById('xp-label').textContent=this.unlocked.size+'/'+this.achievements.length+' achievements';
  },
  showAchievement(ach){
    const t=document.getElementById('achieve-toast');
    document.getElementById('achieve-icon').textContent=ach.icon;
    document.getElementById('achieve-title').textContent=ach.title+' +'+ach.pts+'XP';
    t.classList.add('show');
    window.SFX&&SFX.achieve();
    setTimeout(()=>t.classList.remove('show'),3200);
  }
};

    q:{
      en:"Having worked closely with Antoine, I was struck by his energy. He's someone who succeeds in everything he undertakes — and he undertakes a lot — through determination, drive and a touch of talent. I worked with him on commercial missions: lead sourcing with SalesNav, hunting major accounts (TotalEnergie, Dior, Tod's...), software demos and deal closing. He performed on all fronts. Day to day, Antoine is a natural leader. He drives a team, inspires performance, and his interpersonal skills make internal communication effortless. I can only recommend Antoine.",
      fr:"Ayant travaillé étroitement avec Antoine, j'ai été frappé par son énergie. C'est une personne qui réussit ce qu'elle entreprend (et elle entreprend beaucoup) grâce à sa détermination, son envie de réussir et une touche de talent. Je l'ai cotoyé sur des missions commerciales : sourcing de lead avec SalesNav, chasse grands comptes (TotalEnergie, Dior, Tod's...), démo et closing. Performant sur tous les fronts. Au quotidien, Antoine est naturellement un leader. Il sait driver une équipe, donne envie de performer et ses qualités relationnelles rendent les communications internes très fluides. Je ne peux que le recommander."

/* ─── ANIMATED METRIC ───────────────────────────────────────────────────────── */
function AnimatedMetric({n,s,l,delay=0}){
  const [val,setVal]=useState(0);const [started,setStarted]=useState(false);const ref=useRef();
  useEffect(()=>{const obs=new IntersectionObserver(entries=>{if(entries[0].isIntersecting&&!started)setStarted(true)},{threshold:.5});if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();},[started]);
  useEffect(()=>{if(!started)return;const target=parseInt(n,10);const dur=2000;const start=performance.now();function tick(now){const p=Math.min((now-start)/dur,1);const e=1-Math.pow(1-p,3);setVal(Math.round(e*target));if(p<1)requestAnimationFrame(tick);}setTimeout(()=>requestAnimationFrame(tick),delay);},[started,n,delay]);
  return(<div className="metric" ref={ref}><span className="metric-num">{val}{s}</span><span className="metric-lbl">{l}</span></div>);
}

}

/* ─── PIPELINE ──────────────────────────────────────────────────────────────── */
function Pipeline({lang}){
  const t=T[lang];
  const [stages,setStages]=useState(()=>PIPELINE_STAGES_DEF[lang].map(s=>({...s})));
  const [stage,setStage]=useState(-1);const [fills,setFills]=useState([0,0,0,0,0]);
  const [logs,setLogs]=useState(null);const [running,setRunning]=useState(false);
  const [dragIdx,setDragIdx]=useState(null);const [overIdx,setOverIdx]=useState(null);
  const [wrongMsg,setWrongMsg]=useState('');const [wrongIdx,setWrongIdx]=useState(-1);
  const logRef=useRef();
  useEffect(()=>{setLogs([{t:'READY',m:t.pipeReady}]);setStages(PIPELINE_STAGES_DEF[lang].map(s=>({...s})));setStage(-1);setFills([0,0,0,0,0]);setWrongMsg('');},[lang]);
  const isCorrect=()=>stages.map(s=>s.id).join(',')===CORRECT_ORDER.join(',');
  async function run(){
    if(running)return;
    if(!isCorrect()){
      const idx=stages.findIndex((s,i)=>s.id!==CORRECT_ORDER[i]);
      setWrongIdx(idx);setWrongMsg(t.pipeWrongMsgs[Math.floor(Math.random()*t.pipeWrongMsgs.length)]);
      setTimeout(()=>setWrongIdx(-1),1200);
      window.XP&&window.XP.earn('drag_fail');
      return;
    }
    setWrongMsg('');setRunning(true);setStage(-1);setFills([0,0,0,0,0]);setLogs([]);
    window.XP&&window.XP.earn('pipeline_run');
    const MSGS=lang==='fr'
      ?[['INIT',"Connexion API Retail..."],['FETCH','Téléchargement 847 lignes POS...'],['CLEAN','Suppression nulls, normalisation 32 SKUs...'],['MODEL','Prévision Prophet | MAPE : 4,2%'],['EMBED','Rafraîchissement Power BI · 12 rapports'],['DONE','✓ Livré à 12 parties prenantes | 05:23']]
      :[['INIT','Connecting Retail API...'],['FETCH','Downloading 847 POS rows...'],['CLEAN','Removing nulls, normalizing 32 SKUs...'],['MODEL','Running Prophet forecast | MAPE: 4.2%'],['EMBED','Refreshing Power BI · 12 reports'],['DONE','✓ Delivered to 12 stakeholders | 05:23']];
    for(let i=0;i<6;i++){await new Promise(r=>setTimeout(r,900));setStage(i);setLogs(l=>[...l,{t:MSGS[i][0],m:MSGS[i][1]}]);setTimeout(()=>{if(logRef.current)logRef.current.scrollTop=9999},50);if(i<5){await new Promise(r=>setTimeout(r,320));setFills(f=>{const n=[...f];n[i]=100;return n;});}}
    setRunning(false);
  }
  function onDragStart(i){setDragIdx(i);}
  function onDragOver(e,i){e.preventDefault();setOverIdx(i);}
  function onDrop(e,i){e.preventDefault();if(dragIdx===null||dragIdx===i)return;const ns=[...stages];const m=ns.splice(dragIdx,1)[0];ns.splice(i,0,m);setStages(ns);setDragIdx(null);setOverIdx(null);setWrongMsg('');setStage(-1);setFills([0,0,0,0,0]);setLogs([{t:'RESET',m:t.pipeReady}]);}
  function onDragEnd(){setDragIdx(null);setOverIdx(null);}
  if(!logs)return null;
  return(
    <div className="pipeline-wrap reveal">
      <div className="drag-hint">{t.pipeDragHint}</div>
      <div className="pipeline-stages">
        {stages.map((s,i)=>(
          <React.Fragment key={s.id}>
            <div className={`p-node${running&&i===stage?' running':''}${i<stage?' done':''}${dragIdx===i?' dragging':''}${overIdx===i&&dragIdx!==i?' drag-over':''}${wrongIdx===i?' wrong-order':''}`}
              draggable={!running} onDragStart={()=>onDragStart(i)} onDragOver={e=>onDragOver(e,i)} onDrop={e=>onDrop(e,i)} onDragEnd={onDragEnd}>
              {i<stage&&<span className="p-node-tick">✓</span>}
              <span className="p-node-icon">{s.icon}</span>
              <span className="p-node-label">{s.label}</span>
              <span className="p-node-detail">{s.detail}</span>
            </div>
            {i<stages.length-1&&<div className="p-connector"><div className="p-connector-fill" style={{width:fills[i]+'%'}}/></div>}
          </React.Fragment>
        ))}
      </div>
      {wrongMsg&&<div className="wrong-order-msg">{wrongMsg}</div>}
      <div className="pipeline-log" ref={logRef}>{logs.map((l,i)=><div key={i} className="log-line"><span style={{color:'var(--text-dim)'}}>[{l.t}]</span> {l.m}</div>)}</div>
      <button className="run-btn" onClick={run} disabled={running}>{running?t.pipeRunning:t.pipeRun}</button>
    </div>
  );
}

/* ─── TERMINAL CHATBOT ──────────────────────────────────────────────────────── */
function TerminalChatbot({lang}){
  const t=T[lang];const cmds=TERMINAL_CMDS[lang];
  const [history,setHistory]=useState([{t:'sys',m:lang==='fr'?"Bienvenue — antoine@portfolio:~$":"Welcome — antoine@portfolio:~$"},{t:'dim',m:lang==='fr'?"Tapez 'help' pour voir les commandes.":"Type 'help' to see commands."}]);
  const [input,setInput]=useState('');const [cmdHist,setCmdHist]=useState([]);const [histIdx,setHistIdx]=useState(-1);const [typing,setTyping]=useState(false);
  const outRef=useRef();const inRef=useRef();
  useEffect(()=>{setHistory([{t:'sys',m:lang==='fr'?"Bienvenue — antoine@portfolio:~$":"Welcome — antoine@portfolio:~$"},{t:'dim',m:lang==='fr'?"Tapez 'help' pour voir les commandes.":"Type 'help' to see commands."}]);},[lang]);
  useEffect(()=>{if(outRef.current)outRef.current.scrollTop=outRef.current.scrollHeight;},[history,typing]);
  const colorClass={sys:'chat-line-sys',info:'chat-line-info',cmd:'chat-line-info',dim:'chat-line-dim',acc2:'chat-line-acc2',acc3:'chat-line-sys',acc4:'chat-line-acc4',err:'chat-line-err'};
  async function runCmd(raw){
    const cmd=raw.trim().toLowerCase();if(!cmd)return;
    setCmdHist(h=>[raw,...h]);setHistIdx(-1);
    setHistory(h=>[...h,{t:'user',m:`> ${raw}`}]);
    if(cmd==='clear'){setTimeout(()=>setHistory([]),100);return;}
    const def=cmds[cmd]||cmds[raw.trim()];
    if(!def){setHistory(h=>[...h,{t:'err',m:lang==='fr'?`Commande '${cmd}' introuvable. Tapez 'help'.`:`Command '${cmd}' not found. Type 'help'.`}]);return;}
    window.XP&&window.XP.earn('terminal_cmd');
    setTyping(true);
    for(let i=0;i<def.output.length;i++){await new Promise(r=>setTimeout(r,i===0?200:75));setHistory(h=>[...h,def.output[i]]);}
    setTyping(false);
  }
  function handleKey(e){
    if(e.key==='Enter'){runCmd(input);setInput('');}
    else if(e.key==='ArrowUp'){const ni=Math.min(histIdx+1,cmdHist.length-1);setHistIdx(ni);setInput(cmdHist[ni]||'');}
    else if(e.key==='ArrowDown'){const ni=Math.max(histIdx-1,-1);setHistIdx(ni);setInput(ni===-1?'':cmdHist[ni]||'');}
    else if(e.key==='Tab'){e.preventDefault();const keys=Object.keys(cmds);const m=keys.find(k=>k.startsWith(input));if(m)setInput(m);}
  }
  return(
    <div className="terminal-chat reveal">
      <div className="chat-bar"><div className="t-dot t-red"/><div className="t-dot t-yellow"/><div className="t-dot t-green"/><span className="terminal-path">antoine@portfolio:~$</span></div>
      <div className="chat-output" ref={outRef} onClick={()=>inRef.current?.focus()}>
        {history.map((l,i)=>(<div key={i} className={l.t==='user'?'chat-line-user':colorClass[l.t]||'chat-line-info'}>{l.m}</div>))}
        {typing&&<div className="chat-line-dim">▊</div>}
      </div>
      <div className="chat-input-row"><span className="chat-prompt-label">$</span><input ref={inRef} className="chat-input" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey} autoComplete="off" spellCheck="false" placeholder={t.terminalHint}/></div>
      <div className="chat-hint">TAB autocomplete · ↑↓ history · try: help, ./hack.sh, secret</div>
    </div>
  );
}

/* ─── WORLD MAP (D3 — visited countries only) ───────────────────────────────── */
function WorldMap({countries,setActiveCountry,lang}){
  const svgRef=useRef();
  const containerRef=useRef();
  const [loaded,setLoaded]=useState(false);
  const [hoveredIso,setHoveredIso]=useState(null);

  const ISO_NUM={fr:250,ca:124,de:276,it:380,es:724,tr:792};
  const visitedMap={};
  countries.forEach(c=>{if(ISO_NUM[c.iso])visitedMap[ISO_NUM[c.iso]]=c;});

  useEffect(()=>{
    let cancelled=false;
    const container=containerRef.current;
    if(!container)return;

    const W=container.clientWidth||1000;
    const H=Math.round(W*0.42);

    const svg=d3.select(svgRef.current)
      .attr('viewBox',`0 0 ${W} ${H}`)
      .attr('width','100%')
      .attr('height',H);

    svg.selectAll('*').remove();

    /* ── DEFS ── */
    const uid=Math.random().toString(36).slice(2);
    const defs=svg.append('defs');

    // Stars gradient background
    const bgGrad=defs.append('radialGradient').attr('id','bgGrad'+uid).attr('cx','50%').attr('cy','50%').attr('r','50%');
    bgGrad.append('stop').attr('offset','0%').attr('stop-color','#1A0F2E');
    bgGrad.append('stop').attr('offset','100%').attr('stop-color','#06030F');

    // Glow filter — normal
    const glow=defs.append('filter').attr('id','glow'+uid).attr('x','-40%').attr('y','-40%').attr('width','180%').attr('height','180%');
    glow.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','4').attr('result','blur');
    const m1=glow.append('feMerge');
    m1.append('feMergeNode').attr('in','blur');
    m1.append('feMergeNode').attr('in','blur');
    m1.append('feMergeNode').attr('in','SourceGraphic');

    // Glow filter — hover
    const glowH=defs.append('filter').attr('id','glowH'+uid).attr('x','-60%').attr('y','-60%').attr('width','220%').attr('height','220%');
    glowH.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','8').attr('result','blur');
    const m2=glowH.append('feMerge');
    m2.append('feMergeNode').attr('in','blur');
    m2.append('feMergeNode').attr('in','blur');
    m2.append('feMergeNode').attr('in','blur');
    m2.append('feMergeNode').attr('in','SourceGraphic');

    /* ── BACKGROUND ── */
    svg.append('rect').attr('width',W).attr('height',H).attr('fill',`url(#bgGrad${uid})`).attr('rx',12);

    // Scattered stars
    const rng=(s)=>{let x=s;x=((x>>16^x)*0x45d9f3b)&0xffffffff;x=((x>>16^x)*0x45d9f3b)&0xffffffff;return(x>>16^x);};
    for(let i=0;i<180;i++){
      const sx=Math.abs(rng(i*31+7))%W;
      const sy=Math.abs(rng(i*17+13))%H;
      const sr=Math.abs(rng(i*7+3))%3===0?1.2:0.6;
      const so=(Math.abs(rng(i*11+5))%60+20)/100;
      svg.append('circle').attr('cx',sx).attr('cy',sy).attr('r',sr).attr('fill','white').attr('opacity',so);
    }

    // Subtle grid lines
    const gridG=svg.append('g').attr('opacity',0.06);
    for(let x=0;x<W;x+=W/12) gridG.append('line').attr('x1',x).attr('y1',0).attr('x2',x).attr('y2',H).attr('stroke','#BF3AFF').attr('stroke-width',0.5);
    for(let y=0;y<H;y+=H/7)  gridG.append('line').attr('x1',0).attr('y1',y).attr('x2',W).attr('y2',y).attr('stroke','#BF3AFF').attr('stroke-width',0.5);

    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
      .then(r=>r.json())
      .then(world=>{
        if(cancelled)return;
        const allFeatures=topojson.feature(world,world.objects.countries).features;
        const visitedFeatures=allFeatures.filter(d=>visitedMap[+d.id]);

        if(!visitedFeatures.length){setLoaded(true);return;}

        // Build a collection of just the visited countries for fitExtent
        const collection={type:'FeatureCollection',features:visitedFeatures};

        const proj=d3.geoNaturalEarth1();
        const padding=W*0.12;
        proj.fitExtent([[padding,padding*0.9],[W-padding,H-padding*0.9]],collection);
        const path=d3.geoPath().projection(proj);

        // Connector lines between European countries (aesthetic)
        const centroids={};
        visitedFeatures.forEach(d=>{
          try{
            let [cx,cy]=path.centroid(d);
            if(+d.id===124){cy=cy+path.bounds(d)[1][1]*0.05;}
            centroids[+d.id]={cx,cy,c:visitedMap[+d.id]};
          }catch(e){}
        });

        // Draw faint lines between close European countries
        const euroIds=[250,276,380,724,792];
        const connG=svg.append('g').attr('opacity',0.18);
        euroIds.forEach((id1,i)=>{
          euroIds.slice(i+1).forEach(id2=>{
            const a=centroids[id1],b=centroids[id2];
            if(!a||!b)return;
            const dist=Math.hypot(a.cx-b.cx,a.cy-b.cy);
            if(dist<W*0.22){
              connG.append('line')
                .attr('x1',a.cx).attr('y1',a.cy)
                .attr('x2',b.cx).attr('y2',b.cy)
                .attr('stroke','#BF3AFF').attr('stroke-width',0.8)
                .attr('stroke-dasharray','3 4');
            }
          });
        });

        /* ── DRAW VISITED COUNTRIES ── */
        const countryG=svg.append('g');

        visitedFeatures.forEach(d=>{
          const c=visitedMap[+d.id];
          const g=countryG.append('g').style('cursor','pointer');

          // Glow halo layer
          g.append('path').datum(d).attr('d',path)
            .attr('fill','rgba(191,58,255,0.12)')
            .attr('stroke','rgba(191,58,255,0.5)')
            .attr('stroke-width',3)
            .attr('filter',`url(#glow${uid})`)
            .style('pointer-events','none');

          // Main country fill
          const mainPath=g.append('path').datum(d).attr('d',path)
            .attr('fill','rgba(150,40,230,0.22)')
            .attr('stroke','rgba(191,58,255,0.9)')
            .attr('stroke-width',1.4)
            .attr('filter',`url(#glow${uid})`);

          // Hover interactions
          g.on('mouseenter',function(){
            mainPath.transition().duration(200)
              .attr('fill','rgba(191,58,255,0.45)')
              .attr('stroke','#FF2D78')
              .attr('stroke-width',2.5)
              .attr('filter',`url(#glowH${uid})`);
            haloPath.transition().duration(200)
              .attr('stroke','rgba(255,45,120,0.6)')
              .attr('stroke-width',6);
          });
          g.on('mouseleave',function(){
            mainPath.transition().duration(300)
              .attr('fill','rgba(150,40,230,0.22)')
              .attr('stroke','rgba(191,58,255,0.9)')
              .attr('stroke-width',1.4)
              .attr('filter',`url(#glow${uid})`);
            haloPath.transition().duration(300)
              .attr('stroke','rgba(191,58,255,0.5)')
              .attr('stroke-width',3);
          });
          g.on('click',()=>{setActiveCountry(c);window.SFX&&SFX.click();});

          // Pulsing outer halo
          const haloPath=g.append('path').datum(d).attr('d',path)
            .attr('fill','none')
            .attr('stroke','rgba(191,58,255,0.5)')
            .attr('stroke-width',3)
            .style('pointer-events','none');

          // Animate halo pulse via CSS
          haloPath.node().style.animation=`countryPulse ${1.8+Math.random()*1.2}s ease-in-out infinite`;

          // Label
          try{
            let [cx,cy]=path.centroid(d);
            if(isNaN(cx)||isNaN(cy))return;
            // Canada: centroid is too high — nudge south
            if(+d.id===124){const b=path.bounds(d);cy=(b[0][1]+b[1][1])/2+18;}

            g.append('text').attr('x',cx).attr('y',cy-14)
              .attr('text-anchor','middle').attr('font-size','15')
              .attr('style','pointer-events:none;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.8))')
              .text(c.emoji);

            g.append('text').attr('x',cx).attr('y',cy+4)
              .attr('text-anchor','middle')
              .attr('font-family','Space Mono,monospace')
              .attr('font-size','7.5')
              .attr('font-weight','700')
              .attr('fill','rgba(255,255,255,0.92)')
              .attr('letter-spacing','1.5')
              .attr('style','pointer-events:none;text-shadow:0 1px 6px rgba(0,0,0,1)')
              .text(c.n.toUpperCase());
          }catch(e){}
        });

        // Border glow strip at bottom
        svg.append('rect').attr('x',0).attr('y',H-2).attr('width',W).attr('height',2)
          .attr('fill','url(#bgGrad'+uid+')')
          .attr('opacity',0.6);

        setLoaded(true);
      })
      .catch(()=>setLoaded(true));

    return()=>{cancelled=true;};
  },[lang]);

  return(
    <div ref={containerRef} style={{position:'relative',width:'100%',borderRadius:'8px',overflow:'hidden'}}>
      {!loaded&&(
        <div style={{height:'300px',display:'flex',alignItems:'center',justifyContent:'center',background:'#06030F',fontFamily:"'Space Mono',monospace",fontSize:'.5rem',color:'var(--accent1)',letterSpacing:'4px'}}>
          MAPPING JOURNEYS...
        </div>
      )}
      <svg ref={svgRef} className="world-svg" style={{display:loaded?'block':'none',borderRadius:'8px'}}/>
    </div>
  );
}

          ))}
        </div>
      </div>
    </section>

    {/* WORLD MAP */}
    <div className="world-map-section">
      <div className="world-map-header">
        <span className="world-map-label">{t.worldLabel}</span>
        <span className="world-map-count">{countries.length} {lang==='fr'?'pays vécus':'countries lived'}</span>
      </div>
      <div className="world-map-wrap">
        <div className="world-map-container">
          <WorldMap countries={countries} setActiveCountry={setActiveCountry} lang={lang}/>
        </div>
        <div className="world-flags-row">
          {countries.map((c,i)=>(<button key={i} className="country-flag-btn" onClick={()=>setActiveCountry(c)} title={c.n}><img src={`https://flagcdn.com/48x36/${c.iso}.png`} width="48" height="36" alt={c.n} onError={e=>{e.target.style.display='none'}}/><span className="country-flag-label">{c.n}</span></button>))}
        </div>
      </div>
    </div>

    {/* BLOG */}
    <section id="blog" className="section" style={{background:'var(--bg2)'}}>
      <div style={{maxWidth:'1500px',margin:'0 auto'}}>
        <div className="section-eyebrow">{t.blogEyebrow}</div>
        <h2 className="section-title">{t.blogTitle} <em>{t.blogTitleEm}</em></h2>
        <p style={{fontSize:'.84rem',color:'var(--text-sec)',maxWidth:'560px',marginBottom:'36px',lineHeight:'1.8'}}>{t.blogDesc}</p>
        <Blog lang={lang}/>
      </div>
    </section>

    {/* CH7 — CONTACT */}
    <section id="contact" className="section">
      <div style={{position:'relative',marginBottom:'32px'}}>
        <div className="chapter-label">Chapter 07 — The Decision</div>
        <div style={{position:'absolute',top:'-20px',right:'0',fontFamily:"'Bebas Neue',sans-serif",fontSize:'5rem',color:'var(--border-dim)',lineHeight:1}}>07</div>
      </div>
      <div className="section-eyebrow">{t.contactEyebrow}</div>
      <h2 className="section-title">{t.contactTitle} <em>{t.contactTitleEm}</em></h2>
      <div className="contact-layout reveal">
        <div className="contact-cards">
          <CopyEmailButton lang={lang}/>
          <a href="https://www.linkedin.com/in/antoine2maintenant/" target="_blank" rel="noopener noreferrer" className="contact-card"><span className="contact-icon">🔗</span><div><div className="contact-lbl">LinkedIn</div><div className="contact-val">linkedin.com/in/antoine2maintenant</div></div></a>
          <a href="https://github.com/demaintenant-antoine-pro" target="_blank" rel="noopener noreferrer" className="contact-card"><span className="contact-icon">🐙</span><div><div className="contact-lbl">GitHub</div><div className="contact-val">github.com/demaintenant-antoine-pro</div></div></a>
          <div className="contact-card" style={{cursor:'default'}}><span className="contact-icon">🌍</span><div><div className="contact-lbl">{t.contactLocation}</div><div className="contact-val">France · Dubai · Canada · Singapore · Remote</div></div></div>
          <div className="contact-card" style={{cursor:'default'}}><span className="contact-icon">📱</span><div><div className="contact-lbl">{t.contactPhone}</div><div className="contact-val">+1 (263) 385-6506</div></div></div>
        </div>
        <div className="contact-cta reveal reveal-right">
          <h3>{t.contactH3}</h3>
          <p dangerouslySetInnerHTML={{__html:t.contactP}}/>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:'.56rem',color:'var(--accent1)',letterSpacing:'2px',textTransform:'uppercase',display:'flex',alignItems:'center'}}><span className="status-dot"/>{t.contactStatus}</div>
            <button className="book-call-btn" onClick={()=>{setShowCalendly(true);SFX.click();}}>
              📅 {lang==='fr'?'Réserver un call de 30 min':'Book a 30-min call'} →
            </button>
        </div>
      </div>
    </section>

    <div style={{textAlign:'center',padding:'20px',fontFamily:"'Space Mono',monospace",fontSize:'.44rem',color:'var(--text-mute)',letterSpacing:'2px'}}>
      {t.footerKonami}
    </div>
  </LangCtx.Provider>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
